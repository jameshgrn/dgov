[tasks.add-contributing]
prompt = """
Create a CONTRIBUTING.md file in the root directory.
It should mention:
- Use `uv` for dependencies.
- Use `ruff` for linting and formatting.
- `pytest -q` for tests.
- PRs must be made against `main` via feature branches.
- Use atomic commits in the imperative mood.
"""
agent = "gpt-4o"
files = { create = ["CONTRIBUTING.md"] }
