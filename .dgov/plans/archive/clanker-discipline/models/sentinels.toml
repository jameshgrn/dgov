# Change hollow string sentinels ("") to str | None = None in the two
# core data models (DagTaskSpec and PlanUnit) plus their serializer.
# Also fixes the 3 breaking consumers inside plan.py itself.

[tasks.dag-parser-sentinels]
summary = "Replace hollow string sentinels with None in DagTaskSpec and fix plan.py consumers."
prompt = """
**Orient**

Read these files before editing:
- `src/dgov/dag_parser.py` â€” DagTaskSpec model (lines 29-42)
- `src/dgov/plan.py` â€” PlanUnit model (lines 76-91), compile_plan (lines 160-215), validate_plan (lines 220-400)

This task changes 5 fields from `str = ""` to `str | None = None` and 1 field
from `int = 0` to `int | None = None`. The fields:

In DagTaskSpec (dag_parser.py):
- `prompt: str = ""` -> `prompt: str | None = None`
- `commit_message: str = ""` -> `commit_message: str | None = None`
- `agent: str = ""` -> `agent: str | None = None`
- `test_cmd: str = ""` -> `test_cmd: str | None = None`

In PlanUnit (plan.py):
- `agent: str = ""` -> `agent: str | None = None`
- `test_cmd: str = ""` -> `test_cmd: str | None = None`
- `timeout_s: int = 0` -> `timeout_s: int | None = None`

In PlanSpec (plan.py):
- `default_agent: str = ""` -> `default_agent: str | None = None`
- `sop_set_hash: str = ""` -> `sop_set_hash: str | None = None`
- `source_mtime_max: str = ""` -> `source_mtime_max: str | None = None`

Do NOT change PlanUnit.prompt or PlanUnit.commit_message â€” those are required
fields (no default), keep them as `str`.

Do NOT change DagTaskSpec.timeout_s â€” it has a real default of 900, not a
sentinel. Leave it as `int = 900`.

**Edit**

1. In `src/dgov/dag_parser.py`, change the 4 DagTaskSpec fields listed above.

2. In `src/dgov/plan.py`, change the 6 PlanUnit/PlanSpec fields listed above.

3. Fix the 3 breaking consumers in plan.py that call methods on potentially-None
   prompt strings. All are inside `validate_plan()`:

   Line ~297: `for m in _PROMPT_PATH_RE.finditer(unit.prompt):`
   Fix: guard with `if unit.prompt:` before the loop, or use `unit.prompt or ""`

   Line ~322: `if not unit.prompt.strip() and unit.role != "reviewer":`
   Fix: change to `if not (unit.prompt or "").strip() and unit.role != "reviewer":`

   Line ~385: `if not pattern.search(unit.prompt)`
   Fix: guard the comprehension with `if not unit.prompt: missing = list(_PROMPT_PHASE_RES)` early return,
   or use `pattern.search(unit.prompt or "")`

4. In `compile_plan()` (plan.py ~line 180), the existing `unit.agent or plan.default_agent or project_agent`
   chain already handles None correctly â€” no change needed. Same for
   `unit.timeout_s if unit.timeout_s else plan.default_timeout_s` at ~line 190.

**Verify**

```
uv run ruff check src/dgov/dag_parser.py src/dgov/plan.py
uv run ruff format --check src/dgov/dag_parser.py src/dgov/plan.py
uv run pytest -q -m unit tests/test_dag_parser.py tests/test_plan.py tests/test_plan_tree.py
```
"""
commit_message = "refactor: replace hollow string sentinels with None in DagTaskSpec and PlanUnit"
files.edit = [
    "src/dgov/dag_parser.py",
    "src/dgov/plan.py",
    "tests/test_dag_parser.py",
]
files.read = [
    "tests/test_plan.py",
    "tests/test_plan_tree.py",
]

