prompt = """
Orient:
- Read `docs/docs/pages/plan-reference.mdx`.
- Read `src/dgov/plan.py` or `src/dgov/dag_parser.py` if needed to confirm field defaults.

Edit:
1. Ensure the `files` claim semantics (`create`, `edit`, `delete`, `read`, `touch`) are clearly explained with examples of when to use each.
