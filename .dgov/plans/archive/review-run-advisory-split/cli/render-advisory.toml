[tasks.render-run-advisory]
summary = "Render run-level advisories in plan review CLI."
prompt = """
Orient:
1. Read `src/dgov/cli/plan.py`, `src/dgov/plan_review.py`, and `tests/test_cli_plan_review.py`.
2. `PlanReview` now carries run-level Sentrux advisory fields.
3. The CLI should make advisory/degraded run state visible before per-unit details.

Edit:
1. In human output, render the run-level status and Sentrux advisory near the header, before the unit count.
2. Keep the per-unit settlement output unchanged.
3. Include the same run-level fields in JSON output.
4. Add tests for human output and JSON output.

Verify:
1. Run `uv run pytest -q tests/test_cli_plan_review.py`.
2. Run `uv run ruff check src/dgov/cli/plan.py tests/test_cli_plan_review.py`.
3. Run `uv run ruff format --check src/dgov/cli/plan.py tests/test_cli_plan_review.py`.
"""
commit_message = "Render run advisories in plan review"
depends_on = ["review/extract-advisory.extract-run-advisory"]
files.edit = ["src/dgov/cli/plan.py", "tests/test_cli_plan_review.py"]
files.read = ["src/dgov/plan_review.py"]
test_cmd = "uv run pytest -q tests/test_cli_plan_review.py"
