[tasks.repair-worktree-runtime]
summary = "Repair worktree bootstrap and dependency base-ref selection."
prompt = """
Orient:
- Read `src/dgov/runner.py`, `src/dgov/worktree.py`, and `src/dgov/deploy_log.py` first.
- Read `tests/test_worktree.py`, `tests/test_runner.py`, and `tests/test_integration.py` for current behavior.
- Keep the change focused on runtime correctness. Do not add new CLI surface area.

Edit:
1. In `src/dgov/worktree.py`, stop relying on a shared repo `.venv` for uv-managed Python worktrees. Add explicit worktree preparation that can make a worktree usable before a worker runs.
2. For Python worktrees with `pyproject.toml`, prepare them with `uv sync --locked` when `uv.lock` exists, otherwise `uv sync`. If a repo-specific setup command is explicitly configured, honor that instead.
3. In `src/dgov/runner.py`, prepare the worktree before dispatching the worker and choose the worktree base ref from merged upstream outputs when the task has dependencies. Use deploy-log data so dependent tasks see predecessor changes even across reruns.
4. Fail fast with actionable error text when worktree preparation fails. Preserve existing behavior for non-Python repos that do not need preparation.

Verify:
- `uv run pytest -q -m unit tests/test_worktree.py tests/test_runner.py`
- `uv run pytest -q -m integration tests/test_integration.py`
"""
commit_message = "Repair worktree bootstrap and dependency base refs"
files.edit = ["src/dgov/runner.py", "src/dgov/worktree.py"]
files.read = ["src/dgov/config.py", "src/dgov/deploy_log.py", "tests/test_worktree.py", "tests/test_runner.py", "tests/test_integration.py"]
