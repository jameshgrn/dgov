[tasks.extract-object-path-helpers]
summary = "Split Sentrux object path extraction into simple helpers."
prompt = """
Orient:
1. Read `src/dgov/sentrux_gate.py` and `tests/test_sentrux_gate.py` before editing.
2. The goal is to reduce cyclomatic complexity in `_paths_from_object` while preserving how cycle and god-file offenders are parsed from Sentrux `current.json`.
3. Keep the public `assess_sentrux_gate` contract unchanged.
4. Do not broaden this into baseline-age policy, changed-line attribution, or CLI behavior.

Edit:
1. In `src/dgov/sentrux_gate.py`, split `_paths_from_object` into small private helpers for string, mapping, and sequence inputs.
2. Keep path candidate normalization behavior compatible with existing `_path_candidates`.
3. Add focused tests in `tests/test_sentrux_gate.py` if current coverage does not pin nested mapping/sequence path extraction.

Verify:
1. Run `uv run pytest -q tests/test_sentrux_gate.py`.
2. Run `uv run ruff check src/dgov/sentrux_gate.py tests/test_sentrux_gate.py`.
3. Run `uv run ruff format --check src/dgov/sentrux_gate.py tests/test_sentrux_gate.py`.
"""
commit_message = "Split Sentrux object path extraction"
files.edit = ["src/dgov/sentrux_gate.py", "tests/test_sentrux_gate.py"]
test_cmd = "uv run pytest -q tests/test_sentrux_gate.py"

