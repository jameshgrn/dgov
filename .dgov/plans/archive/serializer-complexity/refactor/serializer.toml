[tasks.reduce-serializer-complexity]
summary = "Extract serializer helpers without changing compiled TOML output."
prompt = """
Orient:
1. Read `src/dgov/serializer.py` and `tests/test_serializer.py` before editing.
2. The goal is to reduce complexity in `serialize_compiled_toml` by extracting pure helper functions.
3. Preserve the exact serialized TOML behavior, task ordering, field ordering, and public function signature.
4. Do not broaden the refactor into plan parsing, SOP bundling, or CLI behavior.

Edit:
1. In `src/dgov/serializer.py`, split `serialize_compiled_toml` into small private helpers.
2. Keep `serialize_compiled_toml(bundle_result, source_mtime_max) -> str` as the public entry point.
3. Prefer helpers around task section emission, task metadata fields, dependency/SOP arrays, and file claims.
4. Keep `_toml_str`, `_toml_ml_str`, and `_toml_key` behavior-compatible.
5. In `tests/test_serializer.py`, add or adjust focused assertions only if needed to lock behavior that the extraction touches.
6. Do not edit `tests/test_cli_compile.py`; use it only as a verification target.

Verify:
1. Run `uv run pytest -q tests/test_serializer.py tests/test_cli_compile.py`.
2. Run `uv run ruff check src/dgov/serializer.py tests/test_serializer.py`.
3. Run `uv run ruff format --check src/dgov/serializer.py tests/test_serializer.py`.
"""
commit_message = "Reduce serializer complexity"
files.edit = ["src/dgov/serializer.py", "tests/test_serializer.py"]
files.read = ["tests/test_cli_compile.py"]
test_cmd = "uv run pytest -q tests/test_serializer.py tests/test_cli_compile.py"
