[tasks.restore-serializer-field-order]
summary = "Restore optional task field order in serializer helpers."
prompt = """
Orient:
1. Read `src/dgov/serializer.py` and `tests/test_serializer.py`.
2. The previous helper extraction must preserve compiled TOML field ordering from the original serializer.
3. The original order after `commit_message` was: `agent`, non-worker `role`, `depends_on`, `timeout_s`, `iteration_budget`, `test_cmd`, `sop_mapping`, then files.
4. Keep the helper extraction; do not inline `serialize_compiled_toml` again.

Edit:
1. In `src/dgov/serializer.py`, adjust `_format_task_section` so optional fields are emitted in the original order.
2. Update the `serialize_compiled_toml` docstring if it still claims lazy imports; this module imports `BundleResult` at module load time.
3. In `tests/test_serializer.py`, add a focused test that would fail if `sop_mapping` appears before `timeout_s`, `iteration_budget`, or `test_cmd` for a task that has all four fields.
4. Do not make unrelated serializer behavior changes.

Verify:
1. Run `uv run pytest -q tests/test_serializer.py tests/test_cli_compile.py`.
2. Run `uv run ruff check src/dgov/serializer.py tests/test_serializer.py`.
3. Run `uv run ruff format --check src/dgov/serializer.py tests/test_serializer.py`.
"""
commit_message = "Restore serializer field order"
files.edit = ["src/dgov/serializer.py", "tests/test_serializer.py"]
files.read = ["tests/test_cli_compile.py"]
test_cmd = "uv run pytest -q tests/test_serializer.py tests/test_cli_compile.py"
