[tasks.fix-reviewed-outcomes]
summary = "Exclude reviewed outcome states from the live task set used by status, watch, and cleanup."
prompt = """
Orient:
- Read `src/dgov/live_state.py` first. The bug is that reviewed outcomes are treated as live tasks.
- Read `tests/test_live_state.py` and `tests/test_cli.py` for current event-derived status behavior.
- Read `src/dgov/cli/__init__.py` only to confirm `dgov status` consumes `tasks_from_events()` and `LIVE_STATES`; do not edit it.
- Do not change persistence schema, event emission, or plan-status behavior.

Edit:
1. In `src/dgov/live_state.py`, remove `reviewed_pass` and `reviewed_fail` from `LIVE_STATES`.
2. Keep `state_from_event()` mapping review events to historical states so `dgov status --all` still shows review outcomes.
3. In `tests/test_live_state.py`, add coverage proving `live_plan_names()` ignores latest-run `review_pass` and `review_fail` outcomes.
4. In `tests/test_cli.py`, add coverage proving default `dgov status` reports idle and hides a latest-run reviewed failure, while `dgov status --all` still exposes it.

Verify:
- `uv run pytest -q -m unit tests/test_live_state.py tests/test_cli.py`
- `uv run ruff check src/dgov/live_state.py tests/test_live_state.py tests/test_cli.py`
- `uv run ruff format --check src/dgov/live_state.py tests/test_live_state.py tests/test_cli.py`
"""
commit_message = "Fix status live-state review outcome filtering"
files.edit = ["src/dgov/live_state.py", "tests/test_live_state.py", "tests/test_cli.py"]
files.read = ["src/dgov/cli/__init__.py"]
