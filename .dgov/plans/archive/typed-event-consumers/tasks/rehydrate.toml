   instead of `(ev: dict, agents=None)`.

3. Replace string dispatch with `isinstance` checks on typed event classes.
   Read typed fields directly (e.g., `event.error` not `ev.get("error")`).

4. For `_format_worker_log`, change to accept the typed `WorkerLog` event.
   Access `event.log_type` and `event.content` directly.

5. For `_format_token_summary`, adapt to read `prompt_tokens` and
   `completion_tokens` from `TaskDone`/`TaskFailed` events directly.
   Simplest: inline the token check at the isinstance branch.

6. Handle `UnknownEvent` by falling through to the default label rendering.

