## Verify

Run: `uv run ruff check src/dgov/cli/watch.py`
Run: `uv run pytest -q tests/ -k watch -x` (if watch tests exist, otherwise skip)

Constraints:
- Do NOT change `read_events()` return type.
- Keep all Rich rendering logic unchanged â€” only change how event data is accessed.
- Preserve suppression logic (task_done without tokens â†’ None, review_pass â†’ None).
"""
commit_message = "Convert watch.py event formatting to typed event matching"
files.edit = ["src/dgov/cli/watch.py"]
files.read = ["src/dgov/event_types.py"]
