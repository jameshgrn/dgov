[tasks.convert-rehydrate]
summary = "Convert _apply_rehydrate_event from dict string-dispatch to typed event matching"
prompt = """
## Orient

`EventDagRunner._apply_rehydrate_event` in `src/dgov/runner.py` (around line 406)
is the #1 cognitive hotspot (complexity 85). It takes a raw `dict` from
`read_events()` and dispatches on `ev["event"]` strings to reconstruct kernel state.

The typed event system was just added in `src/dgov/event_types.py`. It provides:
- 25 frozen dataclasses (one per event type) with typed fields
- `deserialize_event(row: dict) -> DgovEvent` to convert dicts to typed events
- `DgovEvent` discriminated union of all event types

Read `src/dgov/event_types.py` to understand the typed event API.
Read `src/dgov/runner.py` lines 390-454 to understand the current rehydrate logic.

## Edit

1. In `_phase_rehydrate` (~line 401), after iterating `read_events()` dicts,
   call `deserialize_event(ev)` to convert each dict, then pass the typed
   event to `_apply_rehydrate_event`.

2. Change `_apply_rehydrate_event` signature from `(self, ev: dict[str, Any])`
   to `(self, event: DgovEvent)`.

3. Replace the if/elif chain on string names with `isinstance` checks:
   - `EvtTaskDispatched` â†’ `TaskDispatched` kernel event
   - `TaskDone` â†’ `TaskWaitDone(... TaskState.DONE)`
   - `TaskAbandoned` â†’ `TaskWaitDone(... TaskState.ABANDONED)`
   - `TaskFailed` â†’ check `event.error` for timeout heuristic
   - `ReviewPass` / `ReviewFail` â†’ `TaskReviewDone`
   - `MergeCompleted` â†’ `TaskMergeDone(error=None)`
   - `TaskMergeFailed` â†’ `TaskMergeDone(error=event.error)`
   - `GovernorResumed` â†’ `TaskGovernorResumed` with `GovernorAction(event.action)`
   - All other types â†’ return early (no-op, same as current fallthrough)

4. Read `task_slug` and `pane` from event attributes, not dict lookups.

5. Add `deserialize_event` and needed event classes to the existing
   `from dgov.event_types import (...)` block.

## Verify

Run: `uv run ruff check src/dgov/runner.py`
Run: `uv run pytest -q -k "rehydrate or recovery" -x`

Constraints:
- Do NOT change `read_events()` return type â€” it still returns `list[dict]`.
- Do NOT change kernel event types (`TaskDispatched`, `TaskWaitDone`, etc.).
- Keep the function pure â€” no new I/O.
"""
commit_message = "Convert _apply_rehydrate_event to typed event matching"
files.edit = ["src/dgov/runner.py", "tests/test_runner.py"]
files.read = ["src/dgov/event_types.py"]

