# Enforce result-type invariants, add Literal types, refactor CLI renders.

[tasks.result-invariants]
summary = "Add __post_init__ invariant checks to GateResult and ReviewResult."
depends_on = ["consumers/guards.settlement-none-guards"]
prompt = """
**Orient**

Read `src/dgov/settlement.py` lines 33-49 (GateResult and ReviewResult classes).

These frozen dataclasses have `passed: bool` + `error: str | None = None` but
nothing enforces the invariant:
- If passed=True, error must be None
- If passed=False, error must be a non-empty str

This means callers can construct `GateResult(passed=True, error="oops")` or
`GateResult(passed=False)` (no error message) — both are bugs.

**Edit**

1. Add `__post_init__` to GateResult:
   ```python
   def __post_init__(self) -> None:
       if self.passed and self.error is not None:
           raise ValueError("GateResult: passed=True but error is set")
       if not self.passed and not self.error:
           raise ValueError("GateResult: passed=False but no error message")
   ```

2. Add `__post_init__` to ReviewResult:
   ```python
   def __post_init__(self) -> None:
       if self.passed and self.error is not None:
           raise ValueError("ReviewResult: passed=True but error is set")
       if not self.passed and not self.error:
           raise ValueError("ReviewResult: passed=False but no error message")
   ```

3. Search all construction sites of GateResult and ReviewResult in settlement.py
   to confirm they all satisfy the invariant. Look for cases where:
   - `passed=False` is constructed without an error argument (would now raise)
   - `passed=True` is constructed with an error argument (would now raise)
   Fix any that violate.

4. Also check `src/dgov/settlement_flow.py` and `src/dgov/cli/preflight.py`
   for construction sites.

**Verify**

```
uv run ruff check src/dgov/settlement.py
uv run pytest -q -m unit tests/test_settlement.py
```
"""
commit_message = "refactor: enforce GateResult/ReviewResult passed/error invariant"
files.edit = ["src/dgov/settlement.py"]
files.read = [
    "src/dgov/settlement_flow.py",
    "src/dgov/cli/preflight.py",
    "tests/test_settlement.py",
]

