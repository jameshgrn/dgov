[tasks.cli-render-tables]
summary = "Refactor CLI plan review render functions from if-chains to data tables."
prompt = """
**Orient**

Read `src/dgov/cli/plan.py` lines 595-730 — the four render functions:
- `_render_deployed_unit()` (~line 599)
- `_render_failed_unit()` (~line 662)
- `_render_active_unit()` (~line 688)
- `_render_pending_unit()` (~line 706)

Each function does the same thing: check optional fields on a unit and
`click.echo()` a formatted label+value line. This is data, not logic.

**Edit**

1. Create a helper function `_render_unit_fields(fields: list[tuple[str, str | None]]) -> None`
   that iterates the list and echoes non-None values with consistent formatting:
   ```python
   def _render_unit_fields(fields: list[tuple[str, str | None]]) -> None:
       for label, value in fields:
           if value is not None:
               click.echo(f"    {label:13s} {value}")
   ```

2. Refactor each render function to build a list of (label, value) tuples
   instead of individual if/echo blocks. For example, `_render_deployed_unit`
   becomes:
   ```python
   def _render_deployed_unit(unit: UnitReview) -> None:
       fields: list[tuple[str, str | None]] = [
           ("task", unit.summary),
           ("commit", f"{unit.commit_sha[:8]} — {unit.commit_message}" if unit.commit_sha and unit.commit_message else None),
           ("agent", unit.agent),
           ("duration", _fmt_duration(unit.duration_s) if unit.duration_s is not None else None),
           # ... etc
       ]
       _render_unit_fields(fields)
   ```

3. Keep special-case formatting (like the self_corrections line with coloring)
   as separate echo calls after the table — don't force everything into the
   table pattern.

4. Apply the same pattern to all four functions.

**Verify**

```
uv run ruff check src/dgov/cli/plan.py
uv run ruff format --check src/dgov/cli/plan.py
uv run pytest -q -m unit tests/test_plan_review.py
```
"""
commit_message = "refactor: convert CLI render if-chains to data-driven field tables"
files.edit = ["src/dgov/cli/plan.py"]
files.read = ["tests/test_plan_review.py"]
