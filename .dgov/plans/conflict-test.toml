name = "conflict-test"
description = "Test file-claim conflict detection with shared file"

[[task]]
slug = "task-a"
agent = "kimi"
prompt = """Write a poem about file A to tests/poems.txt.

1. Append a 2-line poem about the letter A to tests/poems.txt
2. git add tests/poems.txt
3. git commit -m "Task A: Add poem about letter A"
"""

[[task]]
slug = "task-b"
agent = "kimi"
prompt = """Write a poem about file B to tests/poems.txt.

1. Append a 2-line poem about the letter B to tests/poems.txt
2. git add tests/poems.txt
3. git commit -m "Task B: Add poem about letter B"
"""

[[task]]
slug = "task-c"
agent = "kimi"
files = ["tests/other.txt"]
prompt = """Write a poem about file C to tests/other.txt.

1. Create tests/other.txt with a 2-line poem about the letter C
2. git add tests/other.txt
3. git commit -m "Task C: Add poem about letter C"
"""
