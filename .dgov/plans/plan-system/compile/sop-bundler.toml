# Governor-driven SOP bundler.
# Reads .dgov/sops/*.md, picks SOPs per unit, injects into system_prompt.

[tasks.sop-bundler]
summary = "Bundle markdown SOPs into per-unit system prompts at compile time."
prompt = """
Extend src/dgov/plan_tree.py (or new src/dgov/sop_bundler.py) with:

def bundle_sops(plan, sops_dir: Path) -> CompiledPlan:
    1. Read all .dgov/sops/*.md files (if none, return plan with empty bundling)
    2. Parse each: front-matter name, title, body (prose)
    3. ONE governor LLM call sees (all units, all SOP titles+summaries)
       → emits mapping {unit_id: [sop_name, ...]}
    4. For each unit, build system_prompt = base + concat(selected SOP bodies) + unit.prompt
    5. Cache the unit→[sops] mapping in _compiled.toml (deterministic re-runs)
    6. Return CompiledPlan with system_prompt + sop_bundle per unit

Governor call is load-bearing — no fallback. If LLM unavailable, fail compile.

Notes:
- SOPs are markdown, NOT runnable; no check() functions
- Python in SOP markdown is illustrative (fenced blocks), not executed
- When .dgov/sops/ is empty, bundler no-ops (units keep original prompts)
- Mapping is cached so second compile of same plan + same SOPs is deterministic
"""
commit_message = "Add SOP bundler: inject markdown SOPs into unit prompts at compile"
depends_on = ["validator"]
files.create = ["src/dgov/sop_bundler.py", "tests/test_sop_bundler.py"]
