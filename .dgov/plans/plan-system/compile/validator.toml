# DAG validation: cycles, unreachable units, file-claim conflicts.

[tasks.validator]
summary = "Validate the resolved plan DAG: cycles, unreachable units, shared-file invariants."
prompt = """
Extend `src/dgov/plan_tree.py` with DAG validation:

1. Cycle detection via DFS — report all cycles found, not just first
2. Unreachable unit detection (units with no path from any root unit)
3. File-claim collision map: which units touch which files
4. Return ValidationReport: {cycles, unreachable, file_claims_map}

Do NOT enforce dep-closure or tests-accompany-source here — those are SOP
checks, not compiler invariants. Compiler validates STRUCTURE. SOPs validate
POLICY.

Return the full report even if violations exist — caller decides what's fatal.
"""
commit_message = "Add DAG validator with cycle + reachability checks"
depends_on = ["resolver"]
files.edit = ["src/dgov/plan_tree.py", "tests/test_plan_tree.py"]
