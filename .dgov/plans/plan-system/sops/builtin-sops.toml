# Ship the first two canonical SOPs as example plugins.

[tasks.tests-accompany-source]
summary = "First canonical SOP: units creating src/**/*.py must also produce tests."
prompt = """
Create .dgov/sops/tests_accompany_source.py with:

def check(plan) -> list[Violation]:
    Scan plan.units for any unit where files.create matches src/**/*.py.
    For each such unit, require that either:
      - the same unit creates a tests/test_*.py matching the src file, OR
      - a dependent unit does
    Emit a Violation for each source file without an accompanying test.

Severity: "error" (blocks deploy).
Include 'expected' path in message: "src/dgov/foo.py → expected tests/test_foo.py".
"""
commit_message = "Add tests-accompany-source SOP plugin"
depends_on = ["plugin-loader"]
files.create = [".dgov/sops/tests_accompany_source.py", "tests/test_sop_tests_accompany.py"]

[tasks.dep-closure]
summary = "Second canonical SOP: units editing the same file must have a dep edge."
prompt = """
Create .dgov/sops/dep_closure.py with:

def check(plan) -> list[Violation]:
    Group units by file in their files.edit list.
    For each file touched by >1 unit, verify the units form a dep chain
    (a total order via depends_on, not just a common ancestor).
    Emit one Violation per unordered pair.

Severity: "error".
Message: "units A and B both edit foo.py but no dep edge connects them".
"""
commit_message = "Add dep-closure SOP plugin"
depends_on = ["plugin-loader"]
files.create = [".dgov/sops/dep_closure.py", "tests/test_sop_dep_closure.py"]
