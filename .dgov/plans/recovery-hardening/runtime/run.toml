[tasks.harden-run-entry]
summary = "Force public runs through plan directories and fresh compile."
prompt = """
Orient:
- Read `src/dgov/cli/run.py`, `src/dgov/cli/__init__.py`, and `src/dgov/cli/fix.py`.
- Keep the public governor surface fail-closed: users should not be able to run stale `_compiled.toml` files directly.
- Do not add new flags or compatibility shims.

Edit:
1. In `src/dgov/cli/run.py`, change the public `dgov run` path so it requires a plan directory input and compiles that directory before execution.
2. Reject direct `_compiled.toml` invocation from the public CLI with a clear actionable error telling the user to run `dgov run <plan-dir>`.
3. Keep `_cmd_run_plan(...)` usable for internal callers like `fix`, but make the public CLI surface compile the current plan source first.
4. Update `src/dgov/cli/__init__.py` help text so the command summary matches the new contract.

Verify:
- `uv run pytest -q -m unit tests/test_cli_run_strict.py tests/test_cli.py`
- `uv run ruff check src/dgov/cli/run.py src/dgov/cli/__init__.py tests/test_cli_run_strict.py tests/test_cli.py`
"""
commit_message = "Harden run entry against stale compiled plans"
files.edit = ["src/dgov/cli/run.py", "src/dgov/cli/__init__.py", "tests/test_cli_run_strict.py", "tests/test_cli.py"]
files.read = ["src/dgov/cli/fix.py", "src/dgov/cli/compile.py"]

[tasks.remove-state-repair]
summary = "Remove manual task-state repair commands that bypass plan-governed recovery."
depends_on = ["harden-run-entry"]
prompt = """
Orient:
- Read `src/dgov/cli/state.py`, `src/dgov/cli/__init__.py`, and `tests/test_cli_state.py`.
- The goal is to remove side-door recovery flows that let operators rewrite execution state outside the normal compile -> run path.
- Replace, do not deprecate: remove commands entirely instead of leaving aliases or hidden compatibility hooks.

Edit:
1. Remove the `retry` and `mark-done` CLI commands and unregister the state-repair module from the CLI surface.
2. Delete or rewrite the tests in `tests/test_cli_state.py` so coverage reflects the new fail-closed public surface.
3. Ensure help output no longer advertises the removed commands.

Verify:
- `uv run pytest -q -m unit tests/test_cli_state.py tests/test_cli.py`
- `uv run ruff check src/dgov/cli/__init__.py tests/test_cli_state.py tests/test_cli.py`
"""
commit_message = "Remove manual state repair commands"
files.edit = ["src/dgov/cli/__init__.py", "tests/test_cli.py", "tests/test_cli_state.py"]
files.delete = ["src/dgov/cli/state.py"]
files.read = ["src/dgov/cli/state.py"]
