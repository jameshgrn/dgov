Orient:
- Read `src/dgov/runner.py`, `src/dgov/worktree.py`, `src/dgov/config.py`, and `src/dgov/cli/init.py`.
- Read `tests/test_runner.py`, `tests/test_worktree.py`, `tests/test_config.py`, and `tests/test_cli.py`.
- Keep the change focused on dispatch/bootstrap behavior. Do not change settlement semantics beyond separating timeout config.

Edit:
1. Add a governor-only config field for worktree/bootstrap preparation timeout that is distinct from settlement timeout.
2. Wire `runner._dispatch` to use the new timeout when it prepares worktrees.
3. Skip worktree preparation entirely for `researcher` and `reviewer` tasks.
4. Update init/config rendering so the new timeout is visible and documented consistently.

Verify:
- `uv run pytest -q -m unit tests/test_runner.py tests/test_worktree.py tests/test_config.py tests/test_cli.py`
"""
commit_message = "Split bootstrap timeout from settlement timeout"
