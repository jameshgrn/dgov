[tasks.reduce-review-hotspots]
summary = "Reduce remaining plan-review and CLI hotspot complexity after settlement cleanup."
depends_on = ["runtime/settlement.reduce-runner-settlement-complexity"]
prompt = """
Orient:
- Read `src/dgov/plan_review.py` and `src/dgov/cli/plan.py`.
- Read `tests/test_plan_review.py`, `tests/test_cli.py`, and `tests/test_cli_plan_review.py`.
- The remaining review/report hotspots are `load_review(...)` and the review render paths in `src/dgov/cli/plan.py`.
- Preserve current semantics for review output, worker-note mismatch warnings, and integration telemetry fields.
- Do not touch runtime settlement, worktree replay, or persistence schema in this task.

Edit:
1. Reduce branching in `load_review(...)` and the CLI review render path with small explicit helpers.
2. Keep commit-derived review facts as the source of truth and preserve the current warning behavior for worker-note mismatches.
3. Avoid generic formatter or reporting frameworks. This is a local structural cleanup.
4. Update tests only where needed to keep coverage readable and behavior locked.
5. Stop when the review surfaces are materially simpler and the branch-level structural regression is reduced.

Verify:
- `uv run pytest -q -m unit tests/test_plan_review.py tests/test_cli.py tests/test_cli_plan_review.py`
- `uv run ruff check src/dgov/plan_review.py src/dgov/cli/plan.py tests/test_plan_review.py tests/test_cli.py tests/test_cli_plan_review.py`
- `uv run ty check src/dgov/plan_review.py src/dgov/cli/plan.py tests/test_plan_review.py tests/test_cli.py tests/test_cli_plan_review.py`
- `uv run sentrux gate .`
"""
commit_message = "Reduce review hotspot complexity"
files.edit = ["src/dgov/plan_review.py", "src/dgov/cli/plan.py", "tests/test_plan_review.py", "tests/test_cli.py", "tests/test_cli_plan_review.py"]
files.read = ["src/dgov/semantic_settlement.py", "src/dgov/runner.py"]
