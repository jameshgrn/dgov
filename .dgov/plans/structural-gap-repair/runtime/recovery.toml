[tasks.recovery-split]
summary = "Split runner recovery and rehydration into smaller private phases without changing recovery behavior."
prompt = """
Orient:
- Read `src/dgov/runner.py` around `EventDagRunner.__init__`, `_seed_deployed_state`, `_cleanup_orphaned_actives`, `_resume_failed`, and `_rehydrate` before editing.
- Read the recovery-focused tests in `tests/test_runner.py` and `tests/test_integration.py` before changing structure.
- Preserve existing behavior for latest-run scoping, orphan abandonment on bare rerun, and `--continue` retries. Do not add new CLI flags or broaden the public runner API.

Edit:
1. In `src/dgov/runner.py`, refactor the recovery path into smaller private phases so constructor setup no longer directly coordinates deployed seeding, event replay, orphan abandonment, and resume logic inline.
2. Keep the behavior fail-closed and deterministic: replay only the latest run window, preserve timeout detection from `task_failed` events, and preserve governor-resume event handling.
3. Prefer private helpers inside `EventDagRunner` over a new module unless a new file is clearly necessary. This is a structural split, not a feature addition.
4. Update or add targeted coverage in `tests/test_runner.py` and `tests/test_integration.py` for the refactored recovery flow, especially the orphaned-ACTIVE and rerun/resume paths.

Verify:
- `uv run ruff check src/dgov/runner.py tests/test_runner.py tests/test_integration.py`
- `uv run ty check src/dgov/runner.py`
- `uv run pytest -q tests/test_runner.py tests/test_integration.py`
"""
commit_message = "Split runner recovery flow"
files.edit = [
  "src/dgov/runner.py",
  "tests/test_runner.py",
  "tests/test_integration.py",
]
files.read = [
  "src/dgov/kernel.py",
  "src/dgov/live_state.py",
]
