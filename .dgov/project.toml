[project]
language = "python"
src_dir = "src/"
test_dir = "tests/"
source_extensions = [".py"]
default_agent = "accounts/fireworks/routers/kimi-k2p5-turbo"
test_cmd = "PYTHONPATH=src python -m pytest {test_dir} -q --tb=short"
lint_cmd = "python -m ruff check {file}"
format_cmd = "python -m ruff format {file}"
lint_fix_cmd = "python -m ruff check --fix {file}"
format_check_cmd = "python -m ruff format --check {file}"
type_check_cmd = "python -m ty check"
test_markers = ["unit", "integration"]
review_hooks = [
    "! file --mime {files} | grep -q 'charset=binary'",
    "! grep -rE '(sk-[a-zA-Z0-9]{24,}|AI_[A-Z0-9_]{24,})' {files}"
]

[agents]
kimi = "accounts/fireworks/routers/kimi-k2p5-turbo"
"kimi-k2.5" = "accounts/fireworks/routers/kimi-k2p5-turbo"

# Settlement timeout in seconds (commands exceeding this are killed)
settlement_timeout = 120

[conventions]
test_framework = "pytest"
fixture_style = "function-scoped, in conftest.py or inline"
imports = "absolute only, ruff-enforced"
type_checking = "ty check"
no_commented_code = "delete it, don't comment it out"
error_handling = "fail fast with context, never swallow exceptions"
