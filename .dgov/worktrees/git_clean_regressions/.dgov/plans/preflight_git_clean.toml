[dag]
name = "preflight-git-clean-regressions"

[tasks.add-test]
summary = "Add preflight git-clean regression tests"
agent = "kimi-k2.5"
prompt = """1. Read /Users/jakegearon/projects/dgov/src/dgov/preflight.py. Understand check_git_clean() and _is_git_clean_fast().

2. Create /Users/jakegearon/projects/dgov/tests/test_preflight_git_clean.py with these regressions:
   - test_no_commits_created: Prove check_git_clean() never creates git commits (only reads status)
   - test_dirty_changes_overlap_touches_fail: When dirty files overlap declared touches, check fails with proper message
   - test_dirty_changes_outside_touches_pass: When dirty files are outside declared touches, check passes with "outside declared touches" message
   - test_clean_repo_passes: Clean repo returns passed=True with "clean" message
   - All tests use isolated tmp git repos (not the real project)
   - Fast execution (<100ms each), no network, no filesystem outside tmp_path

3. Run targeted tests with zero warnings tolerance:
   uv run pytest /Users/jakegearon/projects/dgov/tests/test_preflight_git_clean.py -q -W error::RuntimeWarning

4. Lint and format:
   uv run ruff check /Users/jakegearon/projects/dgov/tests/test_preflight_git_clean.py
   uv run ruff format /Users/jakegearon/projects/dgov/tests/test_preflight_git_clean.py

5. Commit:
   git add /Users/jakegearon/projects/dgov/tests/test_preflight_git_clean.py
   git commit -m "Add preflight git-clean regressions: no commits, touch overlap semantics"
"""
commit_message = "Add preflight git-clean regressions: no commits, touch overlap semantics"
timeout_s = 900

[tasks.add-test.files]
create = ["tests/test_preflight_git_clean.py"]
