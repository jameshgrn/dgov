name: CI

on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:
    branches:
      - main
      - 'feat/**'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - run: uv sync --group dev

      - run: uv run ruff check src/ tests/

      - run: uv run ruff format --check src/ tests/

      - run: uv run ty check

      - run: uv run pytest -q -m unit
