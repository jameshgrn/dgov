name: CI

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'release*'
  pull_request:
    branches:
      - main
      - 'feat/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"

      - run: uv sync --group dev --locked

      - run: uv run ruff check src/ tests/

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"

      - run: uv sync --group dev --locked

      - run: uv run ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"

      - run: uv sync --group dev --locked

      - run: uv run ty check

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"

      - run: uv sync --group dev --locked

      - run: uv run pytest -q -m unit
