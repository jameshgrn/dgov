# Minimal Sentrux rules for dgov
# 
# This file is intentionally small — it captures only the actual state of the repo
# today, not aspirational cleanup goals. Rules here are for drift detection:
# if something gets worse, sentrux check will fail.
#
# Add new rules only after verifying the current codebase meets them.

[structure]
# Current max depth is 7 (deepest: dgov.review_executor)
# This prevents runaway nesting without forcing a refactor
max_depth = 7

# Currently 0 cycles — keep it that way
max_cycles = 0

[metrics]
# God files are oversized modules that resist change.
# Current count: 23 files ranging from 512-2206 lines.
# This rule prevents growth, not cleanup.
god_file_limit = 23
