# Sentrux rules for dgov — drift detection + architectural boundaries
#
# Regenerated post-cleanup (1.0.0a1 Lacustrine rebuild).
#
# Section must be [constraints] — sentrux ignores unknown top-level tables.
# Field names must match the Constraints struct in sentrux-core exactly.

[constraints]
# 0 cycles — keep it that way
max_cycles = 0

# No god files after cleanup
no_god_files = true

# Coupling: cross-module edge ratio
# Source-only coupling is 0.34; test→src edges inflate to 0.72.
# Sentrux has no path exclusion — threshold accommodates test imports.
max_coupling_score = 0.75

# Quality signal floor (current: ~0.69, expressed as 0-1 not 0-10000)
min_quality = 0.69

# Boundary rules (enforced by test, not sentrux plugin):
# - kernel.py → only actions.py, types.py (pure, no I/O)
# - worker.py → no dgov imports (standalone subprocess)
# - settlement.py → no dgov imports (pure subprocess calls)
# See tests/test_boundaries.py for enforcement.
