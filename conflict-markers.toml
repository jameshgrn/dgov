# Reject merges that leave unresolved conflict markers on main.

[plan]
version = 1
name = "conflict-markers"
goal = "Detect and reject unresolved git conflict markers in merged files before committing"
default_agent = "qwen-35b"
default_timeout_s = 300
max_retries = 2

[[evals]]
id = "E1"
kind = "happy_path"
statement = "Files with conflict markers are detected and rejected"
evidence = "uv run pytest tests/test_merger.py -q -m unit -k conflict_marker"
scope = ["src/dgov/merger.py", "tests/test_merger.py"]

[[evals]]
id = "E2"
kind = "regression"
statement = "All merger tests pass"
evidence = "uv run pytest tests/test_merger.py -q -m unit"
scope = ["src/dgov/merger.py", "tests/test_merger.py"]

[[evals]]
id = "E3"
kind = "invariant"
statement = "merger.py passes lint"
evidence = "uv run ruff check src/dgov/merger.py"
scope = ["src/dgov/merger.py"]

[units.conflict-markers]
summary = "Add conflict marker detection to post-merge validation in merger.py"
prompt = """
Goal: After a merge lands on main, check all changed files for unresolved git conflict markers (<<<<<<<, =======, >>>>>>>). If found, revert the merge and return an error. This prevents broken code from staying on main.

Read src/dgov/merger.py. Find:
1. The `_lint_fix_merged_files` function — the conflict check should happen BEFORE lint, not after.
2. Both post-merge validation blocks (search for "Post-merge" comments, around lines 1104 and 1222). The conflict check should be the FIRST validation step in both paths.

Implementation:

1. Add a new function:

```python
def _check_conflict_markers(project_root: str, changed_files: list[str]) -> list[str]:
    \"\"\"Check changed files for unresolved git conflict markers.

    Returns list of files containing markers, or empty list if clean.
    \"\"\"
    markers = (b"<<<<<<<", b"=======", b">>>>>>>")
    contaminated = []
    for fname in changed_files:
        fpath = Path(project_root) / fname
        if not fpath.exists() or not fpath.is_file():
            continue
        try:
            content = fpath.read_bytes()
            if any(m in content for m in markers):
                contaminated.append(fname)
        except OSError:
            continue
    return contaminated
```

2. In BOTH post-merge validation blocks (the no-squash path ~line 1104 and the squash path ~line 1222), add the conflict check as the FIRST validation step, before lint and before tests:

```python
# Check for unresolved conflict markers FIRST
conflict_files = _check_conflict_markers(project_root, changed_file_names)
if conflict_files:
    validation_failed = True
    validation_error = f"Unresolved conflict markers in: {', '.join(conflict_files)}"
    logger.error("%s", validation_error)
```

3. Add tests in tests/test_merger.py:

```python
@pytest.mark.unit
def test_conflict_marker_detection_finds_markers(tmp_path):
    from dgov.merger import _check_conflict_markers

    clean = tmp_path / "clean.py"
    clean.write_text("def hello(): pass\\n")

    dirty = tmp_path / "dirty.py"
    dirty.write_text("def hello():\\n<<<<<<< HEAD\\n    pass\\n=======\\n    return\\n>>>>>>> branch\\n")

    result = _check_conflict_markers(str(tmp_path), ["clean.py", "dirty.py"])
    assert result == ["dirty.py"]


@pytest.mark.unit
def test_conflict_marker_detection_clean_files(tmp_path):
    from dgov.merger import _check_conflict_markers

    clean = tmp_path / "ok.py"
    clean.write_text("x = 1\\n")

    result = _check_conflict_markers(str(tmp_path), ["ok.py"])
    assert result == []


@pytest.mark.unit
def test_conflict_marker_detection_missing_file(tmp_path):
    from dgov.merger import _check_conflict_markers

    result = _check_conflict_markers(str(tmp_path), ["nonexistent.py"])
    assert result == []
```

4. uv run ruff check src/dgov/merger.py tests/test_merger.py
5. uv run ruff format src/dgov/merger.py tests/test_merger.py
6. uv run pytest tests/test_merger.py -q -m unit
7. git add src/dgov/merger.py tests/test_merger.py
8. git commit -m "Add conflict marker detection to post-merge validation"
"""
commit_message = "Add conflict marker detection to post-merge validation"
satisfies = ["E1", "E2", "E3"]

[units.conflict-markers.files]
edit = ["src/dgov/merger.py", "tests/test_merger.py"]
