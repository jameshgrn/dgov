# Consolidate WorkerPane: one hardened type in schema.py
# Delete/repurpose duplicate in pane.py

[dag]
name = "consolidate-workerpane"
max_concurrent = 1

[tasks.harden-schema-workerpane]
summary = "Harden the REAL WorkerPane in persistence/schema.py"
commit_message = "Harden schema.WorkerPane: frozen=True, slots=True, strict validation"
files = { edit = ["src/dgov/persistence/schema.py"] }
prompt = """
Harden the WorkerPane dataclass in src/dgov/persistence/schema.py.

This is the REAL WorkerPane used by the system (runner.py, state_ops.py).

CURRENT:
@dataclass
class WorkerPane:
    slug: str
    prompt: str
    pane_id: str
    agent: str
    project_root: str
    worktree_path: str
    branch_name: str
    created_at: float = field(default_factory=time.time)
    owns_worktree: bool = True
    base_sha: str | None = None
    parent_slug: str | None = None
    tier_id: str | None = None
    role: str = "worker"
    state: PaneState = PaneState.ACTIVE
    file_claims: tuple[str, ...] = ()
    commit_message: str | None = None

    def __post_init__(self) -> None:
        _validate_state(self.state)

TARGET:
@dataclass(frozen=True, slots=True)
class WorkerPane:
    slug: str
    prompt: str
    pane_id: str
    agent: str
    project_root: str
    worktree_path: str
    branch_name: str
    created_at: float = field(default_factory=time.time)
    owns_worktree: bool = True
    base_sha: str | None = None
    parent_slug: str | None = None
    tier_id: str | None = None
    role: str = "worker"
    state: PaneState = PaneState.ACTIVE
    file_claims: tuple[str, ...] = ()
    commit_message: str | None = None

    def __post_init__(self) -> None:
        if not isinstance(self.state, PaneState):
            raise TypeError(f"state must be PaneState, got {type(self.state).__name__}: {self.state!r}")
        if not self.slug:
            raise ValueError("slug must be non-empty")
        if not self.prompt:
            raise ValueError("prompt must be non-empty")
        if not self.pane_id:
            raise ValueError("pane_id must be non-empty")

CRITICAL: With frozen=True, all mutations must use dataclasses.replace().
Search for code that mutates WorkerPane instances and update them.

Files to check for mutations:
- src/dgov/persistence/state_ops.py (look for pane.state =, pane.xxx =)
- src/dgov/runner.py (look for WorkerPane mutation)
- Any other files that modify WorkerPane after creation

Replace mutations with:
    from dataclasses import replace
    new_pane = replace(pane, state=PaneState.DONE)

FINAL STEPS:
1. Search for mutations, fix them
2. uv run ruff check src/dgov/persistence/schema.py
3. git add src/dgov/persistence/schema.py
4. git commit -m "Harden schema.WorkerPane: frozen=True, slots=True, strict validation"
"""
agent = "worker"

[tasks.fix-mutations]
summary = "Fix all WorkerPane mutations for frozen dataclass"
depends_on = ["harden-schema-workerpane"]
commit_message = "Fix WorkerPane mutations: use dataclasses.replace()"
files = { edit = ["src/dgov/persistence/state_ops.py", "src/dgov/runner.py"] }
prompt = """
Fix all code that mutates WorkerPane instances.

With frozen=True, these are now errors:
    pane.state = PaneState.DONE          # FrozenInstanceError!
    pane.file_claims = new_claims         # FrozenInstanceError!
    pane.commit_message = "msg"           # FrozenInstanceError!

Find and replace with dataclasses.replace():
    from dataclasses import replace
    
    # Instead of: pane.state = new_state
    pane = replace(pane, state=new_state)
    
    # Instead of: pane.file_claims = new_claims
    pane = replace(pane, file_claims=new_claims)

SEARCH FOR PATTERNS:
- "pane." followed by assignment "=" 
- WorkerPane instances being modified after creation
- Look in state_ops.py for update_pane_state or similar
- Look in runner.py for any pane modification

Replace all mutations with replace() calls that return new instances.

FINAL STEPS:
1. uv run ruff check src/dgov/persistence/state_ops.py src/dgov/runner.py
2. uv run python -c "from dgov.persistence.schema import WorkerPane; print('Imports OK')"
3. git add src/dgov/persistence/state_ops.py src/dgov/runner.py
4. git commit -m "Fix WorkerPane mutations: use dataclasses.replace()"
"""
agent = "worker"

[tasks.repurpose-pane-py]
summary = "Repurpose pane.py to use schema.WorkerPane or delete it"
depends_on = ["fix-mutations"]
commit_message = "Repurpose pane.py: use schema.WorkerPane exclusively"
files = { edit = ["src/dgov/pane.py"] }
prompt = """
src/dgov/pane.py has a duplicate WorkerPane that conflicts with schema.WorkerPane.

DECISION: Keep pane.py as a thin utility module that imports and uses schema.WorkerPane.

CHANGES:
1. Remove the @dataclass(frozen=True, slots=True) class WorkerPane from pane.py
2. Keep the utility functions: create_pane(), close_pane(), list_panes(), pane_exists()
3. Import WorkerPane from schema:
   from dgov.persistence.schema import WorkerPane, PaneState
4. Update all function signatures and return types to use schema.WorkerPane
5. Update create_pane() to return a proper schema.WorkerPane with all required fields:
   - slug, prompt, pane_id, agent, project_root, worktree_path, branch_name (required)
   - state=PaneState.ACTIVE, file_claims=(), etc (optional with defaults)

The create_pane() function needs to gather more context to construct a full schema.WorkerPane.
It currently only has: task_slug, prompt, agent, cwd, session_root, log_file.

Either:
- Add parameters for the missing required fields (project_root, worktree_path, branch_name)
- Or construct a minimal WorkerPane with placeholder values for fields you don't have

SIMPLER OPTION: Remove the WorkerPane type entirely from pane.py, keep functions returning
simple data structures or just pane_id strings. The pane.py module becomes tmux utilities only.

FINAL STEPS:
1. Decide: keep WorkerPane in pane.py as re-export, or remove entirely
2. Update all imports in pane.py
3. Fix any broken function signatures
4. uv run ruff check src/dgov/pane.py
5. git add src/dgov/pane.py
6. git commit -m "Repurpose pane.py: use schema.WorkerPane exclusively"
"""
agent = "worker"

[tasks.update-unit-tests]
summary = "Update all tests for consolidated WorkerPane"
depends_on = ["repurpose-pane-py"]
commit_message = "Update tests for consolidated WorkerPane"
files = { edit = ["tests/test_pane_unit.py"] }
prompt = """
Update tests for the consolidated WorkerPane.

Changes:
1. Import WorkerPane from schema, not pane:
   from dgov.persistence.schema import WorkerPane, PaneState
2. Update all WorkerPane construction to include required fields:
   - slug, prompt, pane_id, agent, project_root, worktree_path, branch_name
3. Use dataclasses.replace() instead of mutation
4. Update validation tests for new __post_init__ checks
5. Delete or update tests that test the old pane.WorkerPane

Add tests for:
- Frozen behavior (mutation blocked)
- replace() works correctly
- __post_init__ validation (empty fields rejected, wrong type rejected)

FINAL STEPS:
1. uv run pytest tests/test_pane_unit.py -v
2. git add tests/test_pane_unit.py
3. git commit -m "Update tests for consolidated WorkerPane"
"""
agent = "worker"

[tasks.verify-one-pathway]
summary = "Verify only one WorkerPane type exists"
depends_on = ["update-unit-tests"]
commit_message = "Verify single WorkerPane pathway"
files = { edit = [] }
prompt = """
Verify there is only ONE WorkerPane type in the codebase.

CHECK:
1. grep -r "class WorkerPane" src/ — should only find ONE match in schema.py
2. grep -r "from.*pane import.*WorkerPane" src/ tests/ — should be NONE or only re-exports
3. All imports should be: from dgov.persistence.schema import WorkerPane

If pane.py still has a WorkerPane class, delete it (should only re-export from schema).

If multiple WorkerPane definitions found, report and fix.

FINAL STEPS:
1. grep checks above
2. uv run pytest tests/ -q — all tests pass
3. git status — verify clean
"""
agent = "worker"

[evals]
schema_imports = "uv run python -c 'from dgov.persistence.schema import WorkerPane; from dataclasses import replace; p=WorkerPane(\"s\", \"p\", \"pid\", \"a\", \"pr\", \"wt\", \"br\"); p2=replace(p, state=p.state); print(\"Schema OK\")'"
frozen_enforced = "uv run python -c 'from dgov.persistence.schema import WorkerPane; p=WorkerPane(\"s\", \"p\", \"pid\", \"a\", \"pr\", \"wt\", \"br\"); p.state=1' 2>&1 | grep -q 'FrozenInstanceError' && echo 'Frozen enforced' || echo 'FAIL'"
validation_works = "uv run python -c 'from dgov.persistence.schema import WorkerPane; WorkerPane(\"\", \"p\", \"pid\", \"a\", \"pr\", \"wt\", \"br\")' 2>&1 | grep -q 'ValueError' && echo 'Validation OK' || echo 'FAIL'"
unit_tests_pass = "uv run pytest tests/test_pane_unit.py -v --tb=short 2>&1 | tail -5"
single_definition = "grep -r 'class WorkerPane' src/ tests/ | wc -l | xargs -I {} test {} -eq 1 && echo 'One definition' || echo 'Multiple definitions!'"
