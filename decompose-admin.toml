[plan]
version = 1
name = "decompose-cli-admin"
goal = "Extract diagnostics.py, codebase.py, config.py, ops.py from cli/admin.py"
session_root = "/Users/jakegearon/projects/dgov"

[[evals]]
id = "E1"
kind = "regression"
statement = "admin CLI commands still work"
evidence = "uv run python3 -c 'from dgov.cli.admin import status, doctor_cmd, codebase_cmd, config_cmd; print(\"OK\")'"

[[evals]]
id = "E2"
kind = "happy_path"
statement = "diagnostics.py exists and exports health check functions"
evidence = "test -f src/dgov/cli/diagnostics.py"

[[evals]]
id = "E3"
kind = "happy_path"
statement = "codebase.py exists and exports CODEBASE.md generation"
evidence = "test -f src/dgov/cli/codebase.py"

[[evals]]
id = "E4"
kind = "happy_path"
statement = "config.py exists and exports configuration commands"
evidence = "test -f src/dgov/cli/config.py"

[[evals]]
id = "E5"
kind = "happy_path"
statement = "ops.py exists and exports operational commands"
evidence = "test -f src/dgov/cli/ops.py"

[[evals]]
id = "E6"
kind = "happy_path"
statement = "admin.py deleted or reduced after decomposition"
evidence = "! test -f src/dgov/cli/admin.py || test $(wc -l < src/dgov/cli/admin.py) -lt 200"

[[evals]]
id = "E7"
kind = "regression"
statement = "CLI tests pass"
evidence = "uv run pytest tests/test_dgov_cli.py -v -m unit -k 'admin or doctor or status or config' 2>&1 | tail -5"

[units.admin-extract-diagnostics]
summary = "Extract diagnostics.py from cli/admin.py"
agent = "qwen-35b"
timeout_s = 600
satisfies = ["E1", "E2"]
commit_message = "refactor(cli): extract diagnostics.py from admin.py"
prompt = """
Decompose cli/admin.py by extracting diagnostics.py submodule.

1. Read src/dgov/cli/admin.py completely
2. Identify all diagnostic/health check functions:
   - preflight_cmd
   - _check_routed_agent_health
   - status
   - _split_live_and_preserved_panes
   - doctor_cmd
   - stats

3. Create src/dgov/cli/diagnostics.py with:
   - Copy imports from admin.py (adjust for new location)
   - The diagnostic functions above
   - Keep internal functions prefixed with _

4. Update src/dgov/cli/admin.py:
   - Import from diagnostics.py instead of defining locally
   - Keep CLI command registration in admin.py (use the imported functions)

5. Update src/dgov/cli/__init__.py if needed to export diagnostics

6. Run import test: uv run python3 -c "from dgov.cli.diagnostics import status, doctor_cmd; print('OK')"

7. git add src/dgov/cli/diagnostics.py src/dgov/cli/admin.py
8. git commit -m "refactor(cli): extract diagnostics.py from admin.py"
"""

[units.admin-extract-diagnostics.files]
create = ["src/dgov/cli/diagnostics.py"]
edit = ["src/dgov/cli/admin.py"]

