[plan]
version = 1
name = "decompose-merger-v2"
goal = "Decompose merger.py (1607 lines) into subpackage"
session_root = "/Users/jakegearon/projects/dgov"

[[evals]]
id = "E1"
kind = "regression"
statement = "merger imports still work"
evidence = "uv run python3 -c 'from dgov.merger import merge_branch; print(\"OK\")'"

[[evals]]
id = "E2"
kind = "happy_path"
statement = "merger.py under 500 lines or is a shim"
evidence = "[ $(wc -l < src/dgov/merger.py) -lt 500 ] || grep -q 'from dgov.merger' src/dgov/merger.py"

[[evals]]
id = "E3"
kind = "regression"
statement = "Tests pass"
evidence = "uv run pytest tests/test_merger*.py -q 2>&1 | tail -1 | grep -q 'passed'"

[units.main]
summary = "Decompose merger.py into subpackage"
agent = "kimi-k25"
timeout_s = 900
satisfies = ["E1", "E2", "E3"]
commit_message = "refactor(merger): decompose 1607-line god file into subpackage"
prompt = """
Goal: Decompose src/dgov/merger.py (1607 lines) into a subpackage.

Extraction targets:
1. merger/validate.py: check_claims(), check_conflicts(), preflight_validate()
2. merger/apply.py: fast_forward_merge(), three_way_merge(), apply_merge()
3. merger/conflicts.py: find_conflicts(), resolve_conflict(), list_conflicts()

Steps:
1. Read src/dgov/merger.py FULLY. Identify exact line ranges for each extraction target.
2. Create src/dgov/merger/ directory with __init__.py
3. Extract validate.py, apply.py, conflicts.py with proper imports
4. __init__.py MUST re-export: merge_branch, check_conflicts, find_conflicts, resolve_conflict
5. Convert merger.py to a thin shim (<500 lines) that imports from the subpackage
6. Run: uv run pytest tests/test_merger*.py -v
7. If tests pass: git add -A src/dgov/merger* && git commit -m "refactor(merger): decompose 1607-line god file into subpackage"

Critical: Preserve ALL public API. Add __all__ to __init__.py.
"""

[units.main.files]
create = [
    "src/dgov/merger/__init__.py",
    "src/dgov/merger/validate.py",
    "src/dgov/merger/apply.py",
    "src/dgov/merger/conflicts.py"
]
edit = ["src/dgov/merger.py"]
