[plan]
version = 1
name = "decompose-terrain-remaining"
goal = "Extract render.py and effects.py from terrain/__init__.py, slim down __init__.py"
session_root = "/Users/jakegearon/projects/dgov"

[[evals]]
id = "E1"
kind = "regression"
statement = "terrain module still works"
evidence = "uv run python3 -c 'from dgov.terrain import ErosionModel, render_terrain, AgentSim; print(\"OK\")'"

[[evals]]
id = "E2"
kind = "happy_path"
statement = "render.py exists and exports rendering functions"
evidence = "test -f src/dgov/terrain/render.py"

[[evals]]
id = "E3"
kind = "happy_path"
statement = "effects.py exists and exports effect classes"
evidence = "test -f src/dgov/terrain/effects.py"

[[evals]]
id = "E4"
kind = "happy_path"
statement = "__init__.py is minimal re-exports only"
evidence = "wc -l src/dgov/terrain/__init__.py | awk '{print $1 < 50}' | grep -q 1"

[units.terrain-extract-render]
summary = "Extract render.py from terrain/__init__.py"
agent = "qwen-35b"
timeout_s = 600
satisfies = ["E1", "E2"]
commit_message = "refactor(terrain): extract render.py"
prompt = """
Extract rendering functions from src/dgov/terrain/__init__.py into a new render.py submodule.

1. Read src/dgov/terrain/__init__.py completely
2. Identify all rendering functions (anything that produces visual output):
   - _elevation_color
   - _river_color
   - _normalize
   - render_terrain
   - overlay_stamps
   - render_effect_stamps
   - _build_dgov_bitmap (visual stamp builder)
   - _stamp_dgov

3. Create src/dgov/terrain/render.py with:
   - Copy imports from __init__.py (adjust for new location)
   - All rendering functions
   - Import _clamp, _session_phase from phases.py if needed for colors
   - Keep internal functions prefixed with _

4. Update src/dgov/terrain/__init__.py:
   - Remove the rendering functions (they move to render.py)
   - Add import: from dgov.terrain.render import render_terrain, overlay_stamps, render_effect_stamps
   - Re-export render_terrain in __all__ if needed

5. Run import test: uv run python3 -c "from dgov.terrain.render import render_terrain; print('OK')"

6. git add src/dgov/terrain/render.py src/dgov/terrain/__init__.py
7. git commit -m "refactor(terrain): extract render.py"
"""

[units.terrain-extract-render.files]
create = ["src/dgov/terrain/render.py"]
edit = ["src/dgov/terrain/__init__.py"]

[units.terrain-extract-effects]
summary = "Extract effects.py from terrain/__init__.py"
agent = "qwen-35b"
timeout_s = 600
deps = ["terrain-extract-render"]
satisfies = ["E1", "E3"]
commit_message = "refactor(terrain): extract effects.py"
prompt = """
Extract effect classes from src/dgov/terrain/__init__.py into a new effects.py submodule.

1. Read current src/dgov/terrain/__init__.py (after render extraction)
2. Identify all effect-related classes and functions:
   - ActiveEffect class
   - EffectBufferOverflowError
   - EventTranslator class
   - AgentSim class
   - _EFFECT_GLYPHS constant
   - _AGENT_STAMPS constant
   - _DEFAULT_STAMP constant

3. Create src/dgov/terrain/effects.py with:
   - Copy imports from __init__.py (adjust for new location)
   - All effect classes, functions, and constants
   - Keep internal functions prefixed with _

4. Update src/dgov/terrain/__init__.py:
   - Remove the effect classes and constants (they move to effects.py)
   - Add import: from dgov.terrain.effects import AgentSim, ActiveEffect, EffectBufferOverflowError
   - Re-export in __all__

5. Run import test: uv run python3 -c "from dgov.terrain.effects import AgentSim, ActiveEffect; print('OK')"

6. git add src/dgov/terrain/effects.py src/dgov/terrain/__init__.py
7. git commit -m "refactor(terrain): extract effects.py"
"""

[units.terrain-extract-effects.files]
create = ["src/dgov/terrain/effects.py"]
edit = ["src/dgov/terrain/__init__.py"]

[units.terrain-slim-init]
summary = "Slim down __init__.py to minimal re-exports"
agent = "qwen-35b"
timeout_s = 300
deps = ["terrain-extract-effects"]
satisfies = ["E1", "E4"]
commit_message = "refactor(terrain): slim __init__.py to minimal re-exports"
prompt = """
Rewrite src/dgov/terrain/__init__.py to be a minimal re-export file (~50 lines).

1. Read current src/dgov/terrain/__init__.py
   - It should already be importing from phases.py, model.py, render.py, effects.py
   - But it likely still has inline code that should be removed

2. Create new minimal __init__.py:
   - Module docstring
   - Imports only: from phases, model, render, effects
   - __all__ list with public exports: ErosionModel, render_terrain, AgentSim, etc.
   - NO inline function definitions
   - NO inline class definitions
   - Just re-exports

3. The new __init__.py should look like:
   \"\"\"SPIM erosion terrain model for dgov dashboard.\"\"\"
   from dgov.terrain.phases import _session_phase, _clamp
   from dgov.terrain.model import ErosionModel
   from dgov.terrain.render import render_terrain, overlay_stamps, render_effect_stamps
   from dgov.terrain.effects import AgentSim, ActiveEffect, EffectBufferOverflowError

   __all__ = ["ErosionModel", "render_terrain", "AgentSim", "ActiveEffect", ...]

4. Run full import check: uv run python3 -c "from dgov.terrain import ErosionModel, render_terrain, AgentSim, ActiveEffect; print('OK')"

5. Check line count: wc -l should be < 50

6. git add src/dgov/terrain/__init__.py
7. git commit -m "refactor(terrain): slim __init__.py to minimal re-exports"
"""

[units.terrain-slim-init.files]
edit = ["src/dgov/terrain/__init__.py"]
