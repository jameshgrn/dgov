Decompose terrain.py by extracting phases.py submodule.

1. Read src/dgov/terrain.py completely
2. Identify all session phase/color functions:
   - _clamp
   - _session_phase
   - _phase_at_hour
   - _lerp_between
   - _PHASE_KEYS (constant)
   - _D8, _D8_DIST, _Q (constants - may need to stay for model)

3. Create src/dgov/terrain/phases.py with:
   - Copy imports from terrain.py (adjust for new location)
   - Session phase functions and constants
   - Keep internal functions prefixed with _

4. Update src/dgov/terrain/__init__.py (will be created from terrain.py):
   - Import from phases.py
   - Re-export phase functions if needed

5. Do NOT delete terrain.py yet

6. Run import test: uv run python3 -c "from dgov.terrain.phases import _session_phase; print('OK')"

7. git add src/dgov/terrain/phases.py
8. git commit -m "refactor(terrain): extract phases.py from terrain.py"
"""

