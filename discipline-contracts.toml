# Discipline audit: enforce function contracts — split inspection.py

[plan]
version = 1
name = "discipline-contracts"
goal = "Split review_worker_pane into pure inspection + side-effect wrapper; rename _run_lint_checks to _apply_lint_fixes"
default_agent = "qwen-35b"
default_timeout_s = 300
max_retries = 2

[[evals]]
id = "E1"
kind = "happy_path"
statement = "A pure inspection function exists that does NOT call emit_event"
evidence = "uv run python3 -c \"import ast; src = open('src/dgov/inspection.py').read(); tree = ast.parse(src); funcs = {n.name: ast.get_source_segment(src, n) for n in ast.walk(tree) if isinstance(n, ast.FunctionDef) and n.name == '_inspect_worker_pane'}; assert funcs, 'Need _inspect_worker_pane function'; body = funcs['_inspect_worker_pane']; assert 'emit_event' not in body, 'pure function must not call emit_event'\""
scope = ["src/dgov/inspection.py"]

[[evals]]
id = "E2"
kind = "happy_path"
statement = "_run_lint_checks is renamed to _apply_lint_fixes or similar"
evidence = "uv run python3 -c \"import ast; src = open('src/dgov/inspection.py').read(); tree = ast.parse(src); names = [n.name for n in ast.walk(tree) if isinstance(n, ast.FunctionDef)]; assert '_run_lint_checks' not in names, 'Should be renamed'; assert any('lint_fix' in n or 'apply_lint' in n for n in names), 'Need apply/fix name'\""
scope = ["src/dgov/inspection.py"]

[[evals]]
id = "E3"
kind = "regression"
statement = "Inspection tests pass"
evidence = "uv run pytest tests/test_inspection.py -q -m unit 2>&1 || true"
scope = ["src/dgov/inspection.py"]

[[evals]]
id = "E4"
kind = "invariant"
statement = "inspection.py passes lint"
evidence = "uv run ruff check src/dgov/inspection.py"
scope = ["src/dgov/inspection.py"]

[units.split-inspection]
summary = "Split review_worker_pane into pure inspection + wrapper"
prompt = """
Goal: review_worker_pane mixes pure inspection (reading diffs, checking files) with side effects (emit_event). Split it.

1. Read src/dgov/inspection.py fully. Understand the flow of review_worker_pane.
2. Create a new function _inspect_worker_pane with the SAME signature as review_worker_pane. Move ALL the pure logic (reading diffs, building the result dict, checking protected files, running lint checks) into it. It must NOT call emit_event.
3. review_worker_pane becomes a thin wrapper:
   def review_worker_pane(project_root, slug, session_root=None, full=False, tests_pass=True, lint_clean=True, post_merge_check=""):
       result = _inspect_worker_pane(project_root, slug, session_root, full, tests_pass, lint_clean, post_merge_check)
       # emit events here
       session_root = os.path.abspath(session_root or project_root)
       emit_event(session_root, slug, "review_pass" if result.get("safe_to_merge") else "review_fail", {... relevant fields ...})
       return result
4. Rename _run_lint_checks to _apply_lint_fixes to clarify it mutates.
5. Update any internal calls to _run_lint_checks to use the new name.
6. git add src/dgov/inspection.py
7. git commit -m "Split review_worker_pane into pure inspection + side-effect wrapper"
"""
commit_message = "Split review_worker_pane into pure inspection + side-effect wrapper"
satisfies = ["E1", "E2", "E3", "E4"]
[units.split-inspection.files]
edit = ["src/dgov/inspection.py"]
read = ["tests/test_inspection.py"]
