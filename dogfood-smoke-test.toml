# Dogfood loop test: minimal end-to-end pipeline verification
# Creates a simple task, runs it through dispatch → review → merge → eval

[plan]
version = 1
name = "dogfood-smoke-test"
goal = "Verify the full dgov pipeline works end-to-end with a minimal safe change"
default_agent = "qwen-35b"
default_timeout_s = 120
max_retries = 1

[[evals]]
id = "E1"
kind = "unit"
statement = "CLI module exists and is importable"
evidence = "uv run python3 -c 'from dgov.cli import main; print(\"cli ok\")'"
scope = ["src/dgov/cli.py"]

[units.add-version-cmd]
summary = "Add --version flag to CLI if missing"
prompt = """
1. Read src/dgov/cli.py. Check if there's already a --version flag.
2. If missing, add it:
   - Find the main click group or command
   - Add a --version option that prints the version from dgov/__init__.py
3. Test: uv run dgov --version
4. If it works: git add src/dgov/cli.py && git commit -m "Add --version flag"
5. If --version already exists: just report success, no changes needed
"""
commit_message = "Add --version flag to CLI"
satisfies = ["E1"]

[units.add-version-cmd.files]
edit = ["src/dgov/cli.py"]
