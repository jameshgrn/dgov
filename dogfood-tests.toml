[dag]
name = "dogfood-test-generation"
max_concurrent = 2

[tasks.test-types]
summary = "Write unit tests for types.py helper functions"
agent = "accounts/fireworks/models/kimi-k2p5"
prompt = """
You are writing tests for dgov's types.py module. The file is at src/dgov/types.py in the worktree.

Read src/dgov/types.py first, then write tests for these functions:
- match_signal(line) — matches log lines against signal patterns, returns formatted string or None
- compute_phase(state, alive, done, duration_s, summary) — derives WorkerPhase from state
- extract_summary_from_log(log_text) — extracts one-line summary from agent logs
- is_noise_line(line) — returns True if line is TUI chrome or noise

Write the tests to tests/test_types.py. Use pytest. Test edge cases:
- Empty strings
- Lines that match multiple patterns
- ANSI-contaminated input
- Phase computation for all WorkerPhase values

Do NOT modify any existing files. Only create tests/test_types.py.
When done, call the 'done' tool.
"""
commit_message = "Add unit tests for types.py helper functions"
files.create = ["tests/test_types.py"]

[tasks.test-plan]
summary = "Write unit tests for plan.py parse and compile"
agent = "accounts/fireworks/models/kimi-k2p5"
prompt = """
You are writing tests for dgov's plan.py module. Read these files first:
- src/dgov/plan.py
- src/dgov/dag_parser.py

Then write tests for:
- parse_plan_file(path) — reads TOML, returns PlanSpec
- compile_plan(plan) — converts PlanSpec to DagDefinition
- validate_plan(plan) — structural validation
- _paths_overlap(path, touch) — path overlap detection
- _normalize_touch_path(path) — path normalization

Write tests to tests/test_plan.py. Use pytest and tmp_path for TOML files.
Create minimal valid TOML plan content in the tests.

Do NOT modify any existing files. Only create tests/test_plan.py.
When done, call the 'done' tool.
"""
commit_message = "Add unit tests for plan.py parse and compile"
files.create = ["tests/test_plan.py"]
