# End-to-end test: full DAG pipeline with eval evidence verification.
# Two independent units, two evals with executable evidence commands.

[plan]
version = 1
name = "e2e-eval-test"
goal = "Add integration_test eval kind and verify eval evidence execution works"
default_agent = "qwen-35b"
default_timeout_s = 180
max_retries = 2

[[evals]]
id = "E1"
kind = "happy_path"
statement = "integration_test is a valid eval kind in plan.py"
evidence = "uv run python3 -c \"from dgov.plan import _ALLOWED_EVAL_KINDS; assert 'integration_test' in _ALLOWED_EVAL_KINDS\""
scope = ["src/dgov/plan.py"]

[[evals]]
id = "E2"
kind = "regression"
statement = "Existing eval kinds still pass validation"
evidence = "uv run pytest tests/test_plan.py -q -m unit -x"
scope = ["src/dgov/plan.py", "tests/test_plan.py"]

[units.add-eval-kind]
summary = "Add integration_test to _ALLOWED_EVAL_KINDS"
prompt = """
1. Read src/dgov/plan.py. Find the _ALLOWED_EVAL_KINDS set (around line 105-113).
2. Add "integration_test" to that set.
3. Read docs/plan-spec.md. Find the list of allowed kind values.
4. Add "- `integration_test`" to that list.
5. Read docs/eval-first-planning.md. Find the kind values list.
6. Add "- `integration_test`: verifies cross-component integration behavior." to that list.
7. uv run ruff check src/dgov/plan.py docs/plan-spec.md docs/eval-first-planning.md
8. uv run pytest tests/test_plan.py -q -m unit
9. git add src/dgov/plan.py docs/plan-spec.md docs/eval-first-planning.md
10. git commit -m "Add integration_test eval kind"
"""
commit_message = "Add integration_test eval kind"
satisfies = ["E1", "E2"]

[units.add-eval-kind.files]
edit = ["src/dgov/plan.py", "docs/plan-spec.md", "docs/eval-first-planning.md"]
