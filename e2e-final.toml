[plan]
version = 1
name = "e2e-final"
goal = "Full E2E: add reliability eval kind, verify dashboard + --wait + evidence"
default_agent = "qwen-9b"
default_timeout_s = 180

[[evals]]
id = "E1"
kind = "happy_path"
statement = "reliability is a valid eval kind"
evidence = "uv run python3 -c \"from dgov.plan import _ALLOWED_EVAL_KINDS; assert 'reliability' in _ALLOWED_EVAL_KINDS\""

[[evals]]
id = "E2"
kind = "regression"
statement = "Plan tests still pass"
evidence = "uv run pytest tests/test_plan.py -q -m unit -x"

[units.add-kind]
summary = "Add reliability to _ALLOWED_EVAL_KINDS and docs"
prompt = """
1. Read src/dgov/plan.py. Find the _ALLOWED_EVAL_KINDS set.
2. Add "reliability" to that set.
3. Read docs/plan-spec.md. Find the allowed kind values list. Add "- `reliability`".
4. Read docs/eval-first-planning.md. Find the kind values list. Add "- `reliability`: asserts fault tolerance, retry behavior, or degradation handling."
5. uv run ruff check src/dgov/plan.py
6. uv run pytest tests/test_plan.py -q -m unit
7. git add src/dgov/plan.py docs/plan-spec.md docs/eval-first-planning.md
8. git commit -m "Add reliability eval kind"
"""
commit_message = "Add reliability eval kind"
satisfies = ["E1", "E2"]

[units.add-kind.files]
edit = ["src/dgov/plan.py", "docs/plan-spec.md", "docs/eval-first-planning.md"]
