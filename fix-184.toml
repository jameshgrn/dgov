# Fix bug #184: Cancel retry descendants on DAG cancel

[plan]
version = 1
name = "fix-184-cancel-retry-descendants"
goal = "Fix bug #184: run_cancel_dag must close all retry descendant panes"
default_agent = "codex-mini"
default_timeout_s = 300
max_retries = 2

[[evals]]
id = "E-bug-fixed"
kind = "regression"
statement = "DAG cancel closes all retry descendant panes, not just original task panes"
evidence = "DGOV_SKIP_GOVERNOR_CHECK=1 uv run pytest tests/test_executor_cancel_retry.py -q -m unit -v"
scope = ["src/dgov/executor.py", "tests/test_executor_cancel_retry.py"]

[[evals]]
id = "E-lint"
kind = "invariant"
statement = "Files pass lint and format"
evidence = "uv run ruff check src/dgov/executor.py tests/test_executor_cancel_retry.py && uv run ruff format --check src/dgov/executor.py tests/test_executor_cancel_retry.py"
scope = ["src/dgov/executor.py", "tests/test_executor_cancel_retry.py"]

[units.fix-cancel-retry]
summary = "Fix bug #184: cancel retry descendants in run_cancel_dag"
prompt = """
1. Read src/dgov/executor.py around run_cancel_dag (line ~2060)
2. The bug: when collecting pane_slugs from task_rows, retry panes are NOT included
3. Fix: After initial collection, recursively find all retry descendants using get_child_panes:
   - Import get_child_panes from dgov.persistence
   - For each pane_slug in initial set, call get_child_panes to find children
   - Add children to pane_slugs set, repeat until no new children
4. Test: Create tests/test_executor_cancel_retry.py with regression test:
   - Mock get_child_panes returning retry descendants
   - Verify cancel loop closes all descendants
5. git add src/dgov/executor.py tests/test_executor_cancel_retry.py
6. git commit -m "fix(executor): cancel retry descendants on DAG cancel"
7. dgov worker complete
Do not call dgov worker complete until the commit exists.
"""
commit_message = "fix(executor): cancel retry descendants on DAG cancel"
satisfies = ["E-bug-fixed", "E-lint"]

[units.fix-cancel-retry.files]
edit = ["src/dgov/executor.py", "tests/test_executor_cancel_retry.py"]
