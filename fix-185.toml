# Fix bug #185: Emit pane_timed_out event on DAG wait timeout

[plan]
version = 1
name = "fix-185-emit-timeout-event"
goal = "Fix bug #185: _dag_wait_any must emit pane_timed_out event on timeout"
default_agent = "codex-mini"
default_timeout_s = 300
max_retries = 2

[[evals]]
id = "E-bug-fixed"
kind = "regression"
statement = "DAG wait timeout emits pane_timed_out event visible to external observers"
evidence = "DGOV_SKIP_GOVERNOR_CHECK=1 uv run pytest tests/test_executor_timeout_event.py -q -m unit -v"
scope = ["src/dgov/executor.py", "tests/test_executor_timeout_event.py"]

[[evals]]
id = "E-lint"
kind = "invariant"
statement = "Files pass lint and format"
evidence = "uv run ruff check src/dgov/executor.py tests/test_executor_timeout_event.py && uv run ruff format --check src/dgov/executor.py tests/test_executor_timeout_event.py"
scope = ["src/dgov/executor.py", "tests/test_executor_timeout_event.py"]

[units.fix-timeout-event]
summary = "Fix bug #185: emit pane_timed_out event in _dag_wait_any"
prompt = """
1. Read src/dgov/executor.py around _dag_wait_any (line ~950)
2. The bug: when timeout occurs, it returns TaskWaitDone but does NOT emit any event
3. Fix: Before returning on timeout, emit a pane_timed_out event:
   - Import emit_event from dgov.persistence
   - Create event with pane_slug, task_slug, and timeout info
   - Call emit_event before returning TaskWaitDone
4. Test: Create tests/test_executor_timeout_event.py with regression test:
   - Verify pane_timed_out event is emitted on timeout
5. git add src/dgov/executor.py tests/test_executor_timeout_event.py
6. git commit -m "fix(executor): emit pane_timed_out event on DAG wait timeout"
7. dgov worker complete
Do not call dgov worker complete until the commit exists.
"""
commit_message = "fix(executor): emit pane_timed_out event on DAG wait timeout"
satisfies = ["E-bug-fixed", "E-lint"]

[units.fix-timeout-event.files]
edit = ["src/dgov/executor.py", "tests/test_executor_timeout_event.py"]
