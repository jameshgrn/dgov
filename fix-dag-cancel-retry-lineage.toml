[plan]
version = 1
name = "fix-dag-cancel-retry-lineage"
goal = "Make DAG cancellation truly terminal so retry descendants and stale running task state cannot survive cancel/retry interleaving"
default_agent = "worker"
default_review_agent = "supervisor"
default_timeout_s = 900
max_concurrent = 1
max_retries = 2

[[evals]]
id = "E-cancel-lineage"
kind = "regression"
statement = "Cancelling a DAG run closes live retry descendants and leaves no stale running lineage behind"
evidence = "DGOV_SKIP_GOVERNOR_CHECK=1 uv run pytest tests/test_dag_overrides.py tests/test_lifecycle.py tests/test_monitor.py -q -m unit"
scope = ["src/dgov/executor.py", "src/dgov/lifecycle.py", "src/dgov/recovery.py", "src/dgov/monitor.py", "tests/test_dag_overrides.py", "tests/test_lifecycle.py", "tests/test_monitor.py"]

[[evals]]
id = "E-cancel-state"
kind = "invariant"
statement = "Cancelled DAG state is terminal and does not preserve stale running or waiting task state"
evidence = "DGOV_SKIP_GOVERNOR_CHECK=1 uv run pytest tests/test_executor.py tests/test_dgov_state.py tests/test_dag_overrides.py -q -m unit"
scope = ["src/dgov/executor.py", "src/dgov/persistence.py", "tests/test_executor.py", "tests/test_dgov_state.py", "tests/test_dag_overrides.py"]

[[evals]]
id = "E-cancel-lint"
kind = "invariant"
statement = "The cancel-lineage files pass lint and format"
evidence = "uv run ruff check src/dgov/executor.py src/dgov/lifecycle.py src/dgov/recovery.py src/dgov/monitor.py src/dgov/persistence.py tests/test_dag_overrides.py tests/test_lifecycle.py tests/test_monitor.py tests/test_executor.py tests/test_dgov_state.py && uv run ruff format --check src/dgov/executor.py src/dgov/lifecycle.py src/dgov/recovery.py src/dgov/monitor.py src/dgov/persistence.py tests/test_dag_overrides.py tests/test_lifecycle.py tests/test_monitor.py tests/test_executor.py tests/test_dgov_state.py"
scope = ["src/dgov/executor.py", "src/dgov/lifecycle.py", "src/dgov/recovery.py", "src/dgov/monitor.py", "src/dgov/persistence.py", "tests/test_dag_overrides.py", "tests/test_lifecycle.py", "tests/test_monitor.py", "tests/test_executor.py", "tests/test_dgov_state.py"]

[units.fix-dag-cancel-retry-lineage]
summary = "Make DAG cancel close retry lineage and persist terminal task/run state deterministically"
prompt = """
1. Read CODEBASE.md.
2. Read src/dgov/executor.py, src/dgov/lifecycle.py, src/dgov/recovery.py, src/dgov/monitor.py, src/dgov/persistence.py, tests/test_dag_overrides.py, tests/test_lifecycle.py, tests/test_monitor.py, tests/test_executor.py, and tests/test_dgov_state.py.
3. Goal: fix the control-plane bug where cancelling a DAG run can still leave retry descendants alive or preserve stale running/waiting task state when cancel interleaves with retry lineage updates.
4. Work from first principles and fix the first wrong layer. Do not patch this in status/UI output. Do not add a second cleanup path or new policy flags.
5. Required behavior:
   - `uv run dgov dag cancel ...` must be truly terminal for the DAG run.
   - If a task has a retry lineage, cancelling the run must close the live descendant pane(s), not just an archived root or stale ancestor slug.
   - DAG task rows and DAG run state must agree on terminal cancellation; no stale `running`, `waiting`, or equivalent task/run state should survive the cancel path.
   - Monitor/kernel bookkeeping must not keep or revive cancelled runs from later retry-lineage events.
6. Add focused regression tests for the real failure mode we saw:
   - a DAG task whose retry child is the live pane while the root/ancestor is archived or stale
   - cancelling the DAG closes the live descendant and leaves no pane rows behind
   - cancelling rewrites the persisted DAG task/run state to terminal cancelled state
   - monitor/event handling does not keep the cancelled DAG active after cancellation plus retry-lineage events
7. Keep the change boring:
   - one canonical cancel/close owner
   - event-derived lineage where the source of truth is available
   - no compatibility shim that duplicates retry lineage logic in multiple places
8. Run:
   - `uv run ruff check src/dgov/executor.py src/dgov/lifecycle.py src/dgov/recovery.py src/dgov/monitor.py src/dgov/persistence.py tests/test_dag_overrides.py tests/test_lifecycle.py tests/test_monitor.py tests/test_executor.py tests/test_dgov_state.py`
   - `uv run ruff format src/dgov/executor.py src/dgov/lifecycle.py src/dgov/recovery.py src/dgov/monitor.py src/dgov/persistence.py tests/test_dag_overrides.py tests/test_lifecycle.py tests/test_monitor.py tests/test_executor.py tests/test_dgov_state.py`
   - `DGOV_SKIP_GOVERNOR_CHECK=1 uv run pytest tests/test_dag_overrides.py tests/test_lifecycle.py tests/test_monitor.py tests/test_executor.py tests/test_dgov_state.py -q -m unit`
9. git add src/dgov/executor.py src/dgov/lifecycle.py src/dgov/recovery.py src/dgov/monitor.py src/dgov/persistence.py tests/test_dag_overrides.py tests/test_lifecycle.py tests/test_monitor.py tests/test_executor.py tests/test_dgov_state.py
10. git commit -m "Make DAG cancellation terminal for retry lineages"
11. dgov worker complete
Do not call `dgov worker complete` until the commit exists.
"""
commit_message = "Make DAG cancellation terminal for retry lineages"
satisfies = ["E-cancel-lineage", "E-cancel-state", "E-cancel-lint"]

[units.fix-dag-cancel-retry-lineage.files]
edit = ["src/dgov/executor.py", "src/dgov/lifecycle.py", "src/dgov/recovery.py", "src/dgov/monitor.py", "src/dgov/persistence.py", "tests/test_dag_overrides.py", "tests/test_lifecycle.py", "tests/test_monitor.py", "tests/test_executor.py", "tests/test_dgov_state.py"]
