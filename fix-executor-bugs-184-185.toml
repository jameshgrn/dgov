# Fix bugs #184 and #185: Simple executor fixes

[plan]
version = 1
name = "fix-executor-bugs-184-185"
goal = "Fix bug #184 (cancel retry descendants) and bug #185 (emit timeout event) in executor.py"
default_agent = "mlx-9b-0"
default_timeout_s = 600
max_retries = 2

[[evals]]
id = "E-bugs-fixed"
kind = "regression"
statement = "Both bugs fixed: retry descendants cancelled on DAG cancel, timeout events emitted on DAG wait"
evidence = "DGOV_SKIP_GOVERNOR_CHECK=1 uv run pytest tests/test_executor_bugs_184_185.py -q -m unit -v"
scope = ["src/dgov/executor.py", "tests/test_executor_bugs_184_185.py"]

[[evals]]
id = "E-lint"
kind = "invariant"
statement = "Files pass lint and format"
evidence = "uv run ruff check src/dgov/executor.py tests/test_executor_bugs_184_185.py && uv run ruff format --check src/dgov/executor.py tests/test_executor_bugs_184_185.py"
scope = ["src/dgov/executor.py", "tests/test_executor_bugs_184_185.py"]

[units.fix-executor-bugs]
summary = "Fix bug #184 and #185 in executor.py"
prompt = """
Read CODEBASE.md, then fix two bugs in src/dgov/executor.py:

BUG #184: Cancelled DAG runs leave retry descendants alive
- In run_cancel_dag function (around line 2060), the code collects pane_slugs from task_rows and cancels them
- Problem: Retry panes (with parent_slug pointing to original panes) are NOT in task_rows, so they're never cancelled
- Fix: After collecting initial pane_slugs, use get_child_panes from dgov.persistence to recursively find all retry descendants and add them to the cancel set

BUG #185: Worker plan tasks stall in read-only phase without emitting timeout events  
- In _dag_wait_any function (around line 950), when timeout occurs it returns TaskWaitDone but does NOT emit any event
- Problem: External observers (monitor, etc.) cannot see that a timeout occurred
- Fix: Before returning TaskWaitDone on timeout, emit a pane_timed_out event via emit_event from dgov.persistence

Steps:
1. Read src/dgov/executor.py around lines 950 (_dag_wait_any) and 2060 (run_cancel_dag)
2. Implement bug #184 fix: add retry descendant collection using get_child_panes
3. Implement bug #185 fix: emit pane_timed_out event before returning on timeout
4. Create tests/test_executor_bugs_184_185.py with regression tests for both bugs
5. Run lint/format: uv run ruff check src/dgov/executor.py tests/test_executor_bugs_184_185.py && uv run ruff format src/dgov/executor.py tests/test_executor_bugs_184_185.py
6. Run tests: DGOV_SKIP_GOVERNOR_CHECK=1 uv run pytest tests/test_executor_bugs_184_185.py -q -m unit -v
7. git add src/dgov/executor.py tests/test_executor_bugs_184_185.py
8. git commit -m "fix(executor): cancel retry descendants on DAG cancel, emit timeout events"
9. dgov worker complete
Do not call dgov worker complete until the commit exists.
"""
commit_message = "fix(executor): cancel retry descendants on DAG cancel, emit timeout events"
satisfies = ["E-bugs-fixed", "E-lint"]

[units.fix-executor-bugs.files]
edit = ["src/dgov/executor.py", "tests/test_executor_bugs_184_185.py"]
