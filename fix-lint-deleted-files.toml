# Fix review lint failure on intentionally deleted files (bug #299)
# The lint functions should skip files that were intentionally deleted.

[plan]
version = 1
name = "fix-lint-deleted-files"
goal = "Fix review lint failure on intentionally deleted files (bug #299)"
default_agent = "qwen-35b"
default_timeout_s = 300

# -- Evals --

[[evals]]
id = "E-inspection-lint"
kind = "regression"
statement = "inspection.py _apply_lint_fixes filters out non-existent files"
evidence = "grep -A5 'for p in paths' src/dgov/inspection.py | grep -q 'if not p.exists(): continue' || grep -A5 'for p in paths' src/dgov/inspection.py | grep -q 'if not Path(p).exists()'"

[[evals]]
id = "E-merger-lint"
kind = "regression"
statement = "merger.py _lint_fix_merged_files filters out non-existent files"
evidence = "grep -A5 'for p in paths' src/dgov/merger.py | grep -q 'if not p.exists(): continue' || grep -A5 'for p in paths' src/dgov/merger.py | grep -q 'if not Path(p).exists()'"

[[evals]]
id = "E-tests-pass"
kind = "happy_path"
statement = "All affected tests pass"
evidence = "DGOV_SKIP_GOVERNOR_CHECK=1 uv run pytest tests/test_inspection.py tests/test_merger.py -q -m unit 2>&1 | tail -1 | grep -q 'passed'"

[[evals]]
id = "E-lint"
kind = "invariant"
statement = "Changed files pass lint"
evidence = "uv run ruff check src/dgov/inspection.py src/dgov/merger.py"

# -- Units --

[units.fix-inspection-lint]
summary = "Filter out deleted files in _apply_lint_fixes"
prompt = """
1. Read src/dgov/inspection.py. Find the _apply_lint_fixes function.
2. Look for the loop that iterates over paths and runs ruff on each file.
3. Before the ruff check (the check call with ['ruff', 'check', '--fix', str(p)]), add a filter to skip non-existent files:
   - Add: if not p.exists(): continue
   - Or:  if not Path(p).exists(): continue
4. The goal is to skip files that were intentionally deleted (marked in delete claims) so we don't try to lint them.
5. uv run ruff check src/dgov/inspection.py
6. uv run ruff format src/dgov/inspection.py
7. git add src/dgov/inspection.py
8. git commit -m "fix: skip lint for non-existent files in review"
9. dgov worker complete
Do NOT call dgov worker complete until you have committed.
"""
commit_message = "fix: skip lint for non-existent files in review"
satisfies = ["E-inspection-lint", "E-tests-pass", "E-lint"]

[units.fix-inspection-lint.files]
edit = ["src/dgov/inspection.py"]

[units.fix-merger-lint]
summary = "Filter out deleted files in _lint_fix_merged_files"
prompt = """
1. Read src/dgov/merger.py. Find the _lint_fix_merged_files function.
2. Look for the loop that iterates over paths and runs ruff on each file.
3. Before the ruff check, add a filter to skip non-existent files:
   - Add: if not p.exists(): continue
   - Or:  if not Path(p).exists(): continue
4. The goal is to skip files that were intentionally deleted so we don't try to lint them.
5. uv run ruff check src/dgov/merger.py
6. uv run ruff format src/dgov/merger.py
7. git add src/dgov/merger.py
8. git commit -m "fix: skip lint for non-existent files in merge"
9. dgov worker complete
Do NOT call dgov worker complete until you have committed.
"""
commit_message = "fix: skip lint for non-existent files in merge"
satisfies = ["E-merger-lint", "E-tests-pass", "E-lint"]

[units.fix-merger-lint.files]
edit = ["src/dgov/merger.py"]

[units.add-test]
summary = "Add test verifying lint skips deleted files"
prompt = """
1. Read src/dgov/inspection.py to understand how _apply_lint_fixes works.
2. Read src/dgov/merger.py to understand how _lint_fix_merged_files works.
3. Read tests/test_inspection.py to see existing test patterns.
4. Create tests/test_deleted_file_lint.py with tests that:
   - Verify lint functions skip non-existent files
   - Mock the necessary dependencies
   - Test both inspection and merger paths
5. Run the tests: DGOV_SKIP_GOVERNOR_CHECK=1 uv run pytest tests/test_deleted_file_lint.py -v
6. git add tests/test_deleted_file_lint.py
7. git commit -m "test: verify lint skips deleted files"
8. dgov worker complete
Do NOT call dgov worker complete until you have committed.
"""
commit_message = "test: verify lint skips deleted files"
satisfies = ["E-tests-pass"]

[units.add-test.files]
create = ["tests/test_deleted_file_lint.py"]
