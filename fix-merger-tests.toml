# Fix merger test interface mismatch
# Tests expect .error attribute on types that don't have it

[plan]
version = 1
name = "fix-merger-tests"
goal = "Fix two failing tests that expect .error attribute on result types that don't have it"
default_agent = "qwen-35b"
default_timeout_s = 300
max_retries = 2

[[evals]]
id = "E1"
kind = "regression"
statement = "test_worker_pane_success_with_merge passes with correct MergeSuccess assertions"
evidence = "DGOV_SKIP_GOVERNOR_CHECK=1 uv run pytest tests/test_merger_conflicts.py::test_worker_pane_success_with_merge -v"
scope = ["tests/test_merger_conflicts.py"]

[[evals]]
id = "E2"
kind = "regression"
statement = "test_worker_pane_skip_returns_conflict_error passes with correct MergeConflict assertions"
evidence = "DGOV_SKIP_GOVERNOR_CHECK=1 uv run pytest tests/test_merger_conflicts.py::test_worker_pane_skip_returns_conflict_error -v"
scope = ["tests/test_merger_conflicts.py"]

[[evals]]
id = "E3"
kind = "happy_path"
statement = "All merger tests pass"
evidence = "DGOV_SKIP_GOVERNOR_CHECK=1 uv run pytest tests/test_merger_conflicts.py -q -m unit"
scope = ["tests/test_merger_conflicts.py"]

[units.fix-test-expectations]
summary = "Fix test assertions to use correct MergeSuccess and MergeConflict attributes"
prompt = """
Fix two failing tests in tests/test_merger_conflicts.py that incorrectly check for .error attribute:

FAILURE 1: test_worker_pane_success_with_merge (around line 385)
- Currently: asserts "not found" not in str(result.error or "")
- Problem: result is MergeSuccess which has NO .error attribute
- Fix: 
  1. Import MergeSuccess from dgov.merger at top of file
  2. Change assertion to: assert isinstance(result, MergeSuccess)
  3. Verify other assertions still make sense (result.merged, result.branch, etc.)

FAILURE 2: test_worker_pane_skip_returns_conflict_error (around line 425)
- Currently: asserts result.error == "Merge conflict in test-branch"
- Problem: result is MergeConflict which has NO .error attribute
- Fix:
  1. Import MergeConflict from dgov.merger at top of file
  2. Change assertions:
     - assert isinstance(result, MergeConflict)
     - assert result.conflicts == ["test.py"]
     - assert result.slug == "test-slug"
     - assert result.branch == "test-branch"

Before making changes:
1. Read tests/test_merger_conflicts.py lines 1-50 to see current imports
2. Read lines 375-430 to understand the test context
3. Read src/dgov/merger.py lines 35-60 to confirm MergeSuccess and MergeConflict dataclass fields

After changes:
1. Run: DGOV_SKIP_GOVERNOR_CHECK=1 uv run pytest tests/test_merger_conflicts.py::test_worker_pane_success_with_merge tests/test_merger_conflicts.py::test_worker_pane_skip_returns_conflict_error -v
2. uv run ruff check tests/test_merger_conflicts.py
3. uv run ruff format tests/test_merger_conflicts.py
4. git add tests/test_merger_conflicts.py
5. git commit -m "Fix merger test assertions to match MergeSuccess/MergeConflict interface"
"""
commit_message = "Fix merger test assertions to match MergeSuccess/MergeConflict interface"
satisfies = ["E1", "E2", "E3"]

[units.fix-test-expectations.files]
edit = ["tests/test_merger_conflicts.py"]
