[plan]
version = 1
name = "fix-readonly-stall"
goal = "Fix Bug #185: Add timeout detection for workers stuck in non-terminal phases during DAG execution"
default_agent = "kimi"
default_timeout_s = 900

[units.fix-readonly-stall]
summary = "Add timeout detection for workers stuck in non-terminal phases"
agent = "kimi"
timeout_s = 900
prompt = """
1. Read HANDOVER.md and understand Bug #185: "Worker plan tasks can stall indefinitely in read-only phase without emitting a timeout event"

2. Read src/dgov/executor.py around line 2556 (_dag_wait_any function). Understand how DAG task waiting currently works - it has a max_timeout but only checks terminal phases (DONE, FAILED, UNKNOWN). The bug is that workers can get stuck in non-terminal phases (IDLE, STUCK, WAITING_INPUT) without the timeout triggering properly.

3. Read src/dgov/monitor.py:
   - observe_worker() around line 383 - how WorkerPhase is determined
   - classify_output() around line 253 - how output classification works
   - The WorkerPhase enum around line 561 in kernel.py shows: WORKING, COMMITTING, DONE, FAILED, STUCK, IDLE, WAITING_INPUT, UNKNOWN

4. The issue: _dag_wait_any only returns TaskWaitDone when phase is in (DONE, FAILED, UNKNOWN). If a worker is stuck in STUCK, IDLE, or WAITING_INPUT for longer than the timeout, it should also be considered "timed_out".

5. Implement the fix in _dag_wait_any:
   - Track when a worker enters a non-terminal, non-working state (STUCK, IDLE, WAITING_INPUT)
   - If stuck in such a state for longer than a threshold (suggest: 30s for STUCK/IDLE/WAITING_INPUT vs the normal max_timeout), emit a TaskWaitDone with "timed_out" state
   - Ensure this generates the proper "pane_timed_out" event via the kernel

6. Add or modify tests in tests/test_executor.py or create tests/test_dag_timeout.py:
   - Test that a worker stuck in STUCK phase for >30s triggers timeout
   - Test that normal WORKING phase respects the full max_timeout
   - Test that DONE/FAILED phases work as before

7. Update HANDOVER.md to mark Bug #185 as fixed

8. git add the changed files
9. git commit -m "Fix #185: Add timeout detection for workers stuck in non-terminal phases"
"""

[units.fix-readonly-stall.files]
edit = ["src/dgov/executor.py", "src/dgov/monitor.py", "src/dgov/kernel.py", "tests/test_executor.py"]
