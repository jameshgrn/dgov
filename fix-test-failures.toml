prompt = """
Goal: Fix 13 failing unit tests across 3 files. All failures are from the executor decomposition
(functions moved between modules) and convergence state changes. Read each file, understand the
failure, and fix it.

## Root cause 1: Stale mock targets (4 tests in test_executor.py)

Functions moved from `dgov.executor` to submodules. The `dgov.executor` module is now empty.
Update these patch targets:

1. `test_dag_review_marks_reviewed_pass_before_merge` (around line 211):
   `patch("dgov.executor.run_review_only"...)` → `patch("dgov.review_executor.run_review_only"...)`
   Also patch `dgov.executor.run_mark_reviewed` → `dgov.pane_executor.run_mark_reviewed`
   Also patch `dgov.executor.run_merge_only` → `dgov.review_executor.run_merge_only`

2. `test_dag_review_marks_reviewed_fail_on_unsafe_verdict` (around line 240):
   Same pattern as above.

3. `TestReviewMerge::test_dag_reactor_executes_merge_task` (around line 324):
   `patch("dgov.executor.run_merge_only"...)` → `patch("dgov.review_executor.run_merge_only"...)`
   And any other `dgov.executor.*` patches → correct submodule

4. `test_dag_dispatch_degradation_returns_deferred` (around line 851):
   `patch("dgov.executor.run_dispatch_preflight")` → `patch("dgov.dispatch_executor.run_dispatch_preflight")`

IMPORTANT: Check EVERY `patch("dgov.executor.` in the file and update ALL of them.
The correct module for each function:
- run_review_only → dgov.review_executor
- run_merge_only → dgov.review_executor
- run_mark_reviewed → dgov.pane_executor
- run_dispatch_preflight → dgov.dispatch_executor
- run_dispatch_only → dgov.dispatch_executor
- run_cleanup_only → dgov.pane_executor
- run_close_only → dgov.pane_executor
- run_complete_pane → dgov.pane_executor
- run_fail_pane → dgov.pane_executor

But also check where the function is CALLED from in the code under test. The monkeypatch target
must match where the function is BOUND, not where it's defined. For example, if dag_executor.py
does `from dgov.review_executor import run_review_only`, then the patch target for testing
dag_executor code should be `dgov.dag_executor.run_review_only` (where it's called from).
Read the actual source code of the function under test to determine the correct patch target.

## Root cause 2: Monkeypatch target mismatch (2 tests)

1. `test_derive_prompt_touches_dedupes_paths` (line 27):
   Monkeypatches `dgov.strategy.extract_task_context` but the function `derive_prompt_touches`
   is in `dgov.dag_executor.py` which does `from dgov.strategy import extract_task_context`.
   The monkeypatch must target where it's BOUND: `dgov.dag_executor.extract_task_context`

2. `TestResolveTouches::test_from_prompt` (around line 411):
   Same issue — check the monkeypatch target matches the import binding.

## Root cause 3: DagWaitAny readonly timeout (4 tests)

These tests mock `_dag_wait_any` and test timeout behavior. The tests expect terminal states
like "done" or "failed" but get "timed_out". Read the actual `_dag_wait_any` function in
dag_executor.py to understand what states it returns, then fix the assertions.

Specific tests:
- `test_done_phase_returns_immediately` — expects pane_state=="done", gets "timed_out"
- `test_failed_phase_returns_immediately` — expects "failed", gets "timed_out"
- `test_reset_readonly_timer_when_entering_working` — expects "done", gets "timed_out"
- `test_multiple_tasks_tracks_separate_readonly_timers` — expects task_slug=="task-2", gets "task-1"

Read the actual `_dag_wait_any` implementation to understand the contract, then fix tests to
match the real behavior.

## Root cause 4: State transition guards (2 tests)

1. `test_mark_reviewed_blocks_transition_from_merged_to_reviewed_fail` (line 752):
   Test expects merged→reviewed_fail transition to be BLOCKED (changed=False).
   But `run_mark_reviewed` now ALLOWS this transition (changed=True).
   Fix: update the assertion to expect changed=True (the transition is now valid).

2. `test_mark_reviewed_blocks_reviewed_pass_from_active` (line 819):
   Same pattern — test expects active→reviewed_pass to be blocked, but it's now allowed.
   Fix: update assertion to expect changed=True.

## Root cause 5: Title update side-effect removed (1 test in test_dgov_helpers.py)

`testupdate_pane_state_writes_state_and_updates_tmux` (line 130):
The test expects `mock_backend.set_title.assert_called_once_with(...)` but `set_title` is
never called. The title update side-effect was removed from `update_pane_state` during
convergence. Fix: remove the `set_title` assertion, or if the test has no remaining useful
assertions, delete it.

## Verification

After all fixes, run:
- `DGOV_SKIP_GOVERNOR_CHECK=1 uv run pytest tests/test_executor.py -q -m unit --tb=no`
- `DGOV_SKIP_GOVERNOR_CHECK=1 uv run pytest tests/test_executor_bugs_184_185.py -q -m unit --tb=no`
- `DGOV_SKIP_GOVERNOR_CHECK=1 uv run pytest tests/test_dgov_helpers.py -q -m unit --tb=no`
- `uv run ruff check tests/test_executor.py tests/test_executor_bugs_184_185.py tests/test_dgov_helpers.py`
- `uv run ruff format tests/test_executor.py tests/test_executor_bugs_184_185.py tests/test_dgov_helpers.py`

Then commit:
  git add tests/test_executor.py tests/test_executor_bugs_184_185.py tests/test_dgov_helpers.py
  git commit -m "Fix 13 test failures from executor decomposition"
"""

