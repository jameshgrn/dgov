[plan]
version = 1
name = "fix-test-lint"
goal = "Fix lint issues in test_deleted_file_lint.py"
default_agent = "qwen-35b"
default_timeout_s = 120

[[units]]
slug = "fix-test-lint"
summary = "Fix F841 unused variable lint errors in test_deleted_file_lint.py"
prompt = """
1. Read tests/test_deleted_file_lint.py. Find the unused variable lint errors (F841).
2. The errors are:
   - Line 61: `result = _apply_lint_fixes(...)` - assigned but never used
   - Line 132: `result = _lint_fix_merged_files(...)` - assigned but never used
   - Line 192: `result = _lint_fix_merged_files(...)` - assigned but never used
   - Line 219: `mock_run` in `with patch(...)` - mock_run is not used
   - Line 237: `mock_run` in `with patch(...)` - mock_run is not used
3. Fix each by either:
   - Removing the unused variable assignment (just call the function without assigning result)
   - Using `mock_run` (add `assert mock_run.called` or remove `as mock_run`)
4. Run lint to verify: uv run ruff check tests/test_deleted_file_lint.py
5. git add tests/test_deleted_file_lint.py
6. git commit -m "style: fix unused variable lint errors"
7. dgov worker complete
Do NOT call dgov worker complete until you have committed.
"""
commit_message = "style: fix unused variable lint errors"

[units.fix-test-lint.files]
edit = ["tests/test_deleted_file_lint.py"]
