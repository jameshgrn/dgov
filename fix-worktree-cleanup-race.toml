[plan]
version = 1
name = "fix-worktree-cleanup-race"
goal = "Fix orphaned worktree cleanup to preserve active DAG worktrees"
session_root = "/Users/jakegearon/projects/dgov"

# The bug: status.py prune_stale_panes() only checks the 'panes' table
# for known worktrees. DAG tasks create worktrees but the pane record
# may not be immediately visible. After 60 seconds, the worktree is
# considered "orphaned" and deleted, even though the worker is still running.
#
# The fix: Include worktrees from active DAG tasks in known_worktrees set.

[[evals]]
id = "E1"
kind = "regression"
statement = "All tests pass"
evidence = "uv run pytest tests/ -q 2>&1 | tail -1 | grep -q 'passed'"

[[evals]]
id = "E2"
kind = "happy_path"
statement = "Active DAG worktrees are preserved during stale pane cleanup"
evidence = "grep -q 'dag_worktrees' src/dgov/status.py"

[units.fix-status-py]
summary = "Update prune_stale_panes to check DAG tasks"
agent = "kimi-k25"
timeout_s = 600
satisfies = ["E1", "E2"]
commit_message = "fix(status): preserve worktrees for active DAG tasks during cleanup"
prompt = """
Fix the orphaned worktree cleanup bug in src/dgov/status.py.

The bug is in prune_stale_panes() around line 590. It builds:
    known_worktrees = {p.get("worktree_path") for p in panes ...}

But this only checks the 'panes' table. DAG tasks also create worktrees,
and after 60 seconds these worktrees are deleted as "orphaned" even though
the worker is still running.

The fix:
1. Find the code around line 590 that builds known_worktrees
2. Also query dag_tasks for active tasks and get their worktree paths
3. Add those worktrees to known_worktrees

Look for:
- The query that builds known_worktrees from 'panes'
- The orphaned worktree cleanup logic (lines 578+)
- The 60-second grace period check

Add a query like:
    SELECT DISTINCT dt.worktree_path
    FROM dag_tasks dt
    JOIN dag_runs dr ON dt.run_id = dr.id
    WHERE dr.status = 'running'
    AND dt.status NOT IN ('merged', 'failed', 'skipped')

Include those worktrees in known_worktrees so they're preserved.

Run tests: uv run pytest tests/test_status*.py -v
Commit when done.
"""

[units.fix-status-py.files]
edit = ["src/dgov/status.py"]
