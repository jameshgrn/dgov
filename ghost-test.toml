[plan]
version = 1
name = "ghost-test"
goal = "Verify zero ghost panes after DAG completion"
default_agent = "qwen-9b"
default_timeout_s = 180

[[evals]]
id = "E1"
kind = "happy_path"
statement = "composability is a valid eval kind"
evidence = "uv run python3 -c \"from dgov.plan import _ALLOWED_EVAL_KINDS; assert 'composability' in _ALLOWED_EVAL_KINDS\""

[units.add-kind]
summary = "Add composability to _ALLOWED_EVAL_KINDS"
prompt = """
1. Read src/dgov/plan.py. Find the _ALLOWED_EVAL_KINDS set.
2. Add "composability" to that set.
3. uv run ruff check src/dgov/plan.py
4. uv run pytest tests/test_plan.py -q -m unit
5. git add src/dgov/plan.py
6. git commit -m "Add composability eval kind"
"""
commit_message = "Add composability eval kind"
satisfies = ["E1"]

[units.add-kind.files]
edit = ["src/dgov/plan.py"]
