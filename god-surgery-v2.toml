[plan]
version = 1
name = "god-surgery-v2"
goal = "Decompose persistence.py, lifecycle.py, merger.py into subpackages"
session_root = "/Users/jakegearon/projects/dgov"
default_agent = "kimi-k25"

# Convergence target: God files 23 -> 20 (reduce top 3 god files by 60% each)
# Priority: persistence (2206), lifecycle (1754), merger (1607)

[[evals]]
id = "E1"
kind = "regression"
statement = "persistence imports still work"
evidence = "uv run python3 -c 'from dgov.persistence import PaneRecord, EventBus; print(\"OK\")'"

[[evals]]
id = "E2"
kind = "happy_path"
statement = "persistence.py under 500 lines or is a shim"
evidence = "[ $(wc -l < src/dgov/persistence.py) -lt 500 ] || grep -q 'from dgov.persistence' src/dgov/persistence.py"

[[evals]]
id = "E3"
kind = "regression"
statement = "lifecycle imports still work"
evidence = "uv run python3 -c 'from dgov.lifecycle import create_pane, destroy_pane; print(\"OK\")'"

[[evals]]
id = "E4"
kind = "happy_path"
statement = "lifecycle.py under 500 lines or is a shim"
evidence = "[ $(wc -l < src/dgov/lifecycle.py) -lt 500 ] || grep -q 'from dgov.lifecycle' src/dgov/lifecycle.py"

[[evals]]
id = "E5"
kind = "regression"
statement = "merger imports still work"
evidence = "uv run python3 -c 'from dgov.merger import merge_branch; print(\"OK\")'"

[[evals]]
id = "E6"
kind = "happy_path"
statement = "merger.py under 500 lines or is a shim"
evidence = "[ $(wc -l < src/dgov/merger.py) -lt 500 ] || grep -q 'from dgov.merger' src/dgov/merger.py"

[[evals]]
id = "E7"
kind = "regression"
statement = "All tests pass"
evidence = "uv run pytest tests/ -q -x --tb=no 2>&1 | tail -1 | grep -q 'passed'"

[units.decompose-persistence]
summary = "Decompose persistence.py (2206 lines) into persistence/ subpackage"
agent = "kimi-k25"
timeout_s = 900
satisfies = ["E1", "E2", "E7"]
commit_message = "refactor(persistence): decompose 2206-line god file into subpackage"
prompt = """
Goal: Decompose src/dgov/persistence.py into a subpackage.

Extraction targets:
1. persistence/notify.py: _notify_waiters(), _wait_for_notify(), _notify_dir
2. persistence/events.py: EventBus, publish_event(), log_event(), get_events_for_pane()
3. persistence/schema.py: CREATE_PANES_SQL, CREATE_EVENTS_SQL, ensure_schema()
4. persistence/records.py: PaneRecord dataclass, save_pane(), load_pane(), get_pane(), list_panes()

Steps:
1. Read src/dgov/persistence.py completely. Identify exact line ranges for each target.
2. Create the 5 files in src/dgov/persistence/ with appropriate content
3. __init__.py must re-export: PaneRecord, EventBus, notify_event, publish_event, save_pane, load_pane, get_pane, list_panes
4. Update persistence.py to import from subpackage (or convert to shim)
5. Run: uv run pytest tests/test_persistence*.py -v
6. If tests pass: git add -A && git commit

Critical:
- Preserve ALL public function signatures (backward compat)
- Add __all__ to __init__.py
- Tests must pass before commit
"""

[units.decompose-persistence.files]
create = [
    "src/dgov/persistence/__init__.py",
    "src/dgov/persistence/notify.py",
    "src/dgov/persistence/events.py",
    "src/dgov/persistence/schema.py",
    "src/dgov/persistence/records.py"
]
edit = ["src/dgov/persistence.py"]

