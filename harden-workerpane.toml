# Harden WorkerPane: frozen + slots + __post_init__ validation
# Simple, strict, fast — zero dependencies

[dag]
name = "harden-workerpane"
max_concurrent = 1

[tasks.harden-dataclass]
summary = "Harden WorkerPane with frozen=True, slots=True, __post_init__ validation"
commit_message = "Harden WorkerPane: frozen, slots, runtime validation"
files = { edit = ["src/dgov/pane.py"] }
prompt = """
Harden the WorkerPane dataclass in src/dgov/pane.py to be strict and fast.

CURRENT STATE:
@dataclass
class WorkerPane:
    slug: str
    task_slug: str
    state: PaneState = PaneState.ACTIVE
    pane_id: str | None = None
    agent: str | None = None

TARGET STATE:
@dataclass(frozen=True, slots=True)
class WorkerPane:
    """Worker pane state container — immutable, validated."""
    slug: str
    task_slug: str
    state: PaneState = PaneState.ACTIVE
    pane_id: str | None = None
    agent: str | None = None

    def __post_init__(self) -> None:
        if not isinstance(self.state, PaneState):
            raise TypeError(f"state must be PaneState, got {type(self.state).__name__}: {self.state!r}")
        if not self.slug:
            raise ValueError("slug must be non-empty")
        if not self.task_slug:
            raise ValueError("task_slug must be non-empty")

CHANGES NEEDED:
1. Change @dataclass to @dataclass(frozen=True, slots=True)
2. Add __post_init__ method with validation
3. Update docstring to mention immutable/validated

CRITICAL: Because frozen=True, you can no longer mutate WorkerPane instances.
Check if any code mutates WorkerPane (e.g., pane.state = ...) and fix it by
creating new instances instead.

FINAL STEPS:
1. uv run ruff check src/dgov/pane.py
2. git add src/dgov/pane.py
3. git commit -m "Harden WorkerPane: frozen, slots, runtime validation"
"""
agent = "worker"

[tasks.add-mypy-strict]
summary = "Add strict mypy configuration to pyproject.toml"
depends_on = ["harden-dataclass"]
commit_message = "Add strict mypy configuration"
files = { edit = ["pyproject.toml"] }
prompt = """
Add strict mypy configuration to pyproject.toml.

Add this section if not present:
[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true

If [tool.mypy] already exists, ensure strict = true is set.

FINAL STEPS:
1. git add pyproject.toml
2. git commit -m "Add strict mypy configuration"
"""
agent = "worker"

[tasks.fix-callers]
summary = "Fix any code that mutates WorkerPane (frozen breaks mutation)"
depends_on = ["harden-dataclass"]
commit_message = "Fix WorkerPane callers for frozen dataclass"
files = { edit = ["src/dgov/pane.py", "tests/test_pane_unit.py"] }
prompt = """
Fix any code that mutates WorkerPane instances.

With frozen=True, this is now illegal:
    pane.state = PaneState.CLOSED  # FrozenInstanceError!

Instead, create a new instance:
    pane = WorkerPane(
        slug=pane.slug,
        task_slug=pane.task_slug,
        state=PaneState.CLOSED,  # New state
        pane_id=pane.pane_id,
        agent=pane.agent,
    )

Or use dataclasses.replace():
    from dataclasses import replace
    pane = replace(pane, state=PaneState.CLOSED)

Search for and fix any mutation patterns in:
- src/dgov/pane.py (look for pane.state =, pane.pane_id =, etc.)
- tests/test_pane_unit.py (test code that mutates WorkerPane)

Replace with immutable patterns (create new instance or use replace()).

FINAL STEPS:
1. uv run ruff check src/dgov/pane.py tests/test_pane_unit.py
2. uv run pytest tests/test_pane_unit.py -v
3. git add src/dgov/pane.py tests/test_pane_unit.py
4. git commit -m "Fix WorkerPane callers for frozen dataclass"
"""
agent = "worker"

[tasks.update-unit-tests]
summary = "Update unit tests for frozen WorkerPane"
depends_on = ["fix-callers"]
commit_message = "Update unit tests for frozen WorkerPane"
files = { edit = ["tests/test_pane_unit.py"] }
prompt = """
Update tests/test_pane_unit.py for the new frozen WorkerPane.

Changes needed:
1. Tests that create WorkerPane should still work (frozen doesn't affect construction)
2. Tests that mutate WorkerPane need to use dataclasses.replace() or recreate
3. Add test for __post_init__ validation:
   - Test that invalid state type raises TypeError
   - Test that empty slug raises ValueError
   - Test that empty task_slug raises ValueError

Example test:
def test_workerpane_rejects_raw_string_state():
    with pytest.raises(TypeError, match="state must be PaneState"):
        WorkerPane(slug="test", task_slug="task", state="active")  # Raw string!

FINAL STEPS:
1. uv run pytest tests/test_pane_unit.py -v
2. git add tests/test_pane_unit.py
3. git commit -m "Update unit tests for frozen WorkerPane"
"""
agent = "worker"

[evals]
imports_ok = "uv run python -c 'from dgov.pane import WorkerPane; from dataclasses import replace; p = WorkerPane(\"test\", \"task\"); p2 = replace(p, state=p.state); print(\"Frozen+replace OK\")'"
frozen_enforced = "uv run python -c 'from dgov.pane import WorkerPane; p = WorkerPane(\"test\", \"task\"); p.state = 1' 2>&1 | grep -q 'FrozenInstanceError' && echo 'Frozen enforced' || echo 'NOT frozen'"
validation_works = "uv run python -c 'from dgov.pane import WorkerPane; p = WorkerPane(\"test\", \"task\", state=\"raw\")' 2>&1 | grep -q 'TypeError' && echo 'Validation works' || echo 'No validation'"
unit_tests_pass = "uv run pytest tests/test_pane_unit.py -v --tb=short 2>&1 | tail -5"
lint_clean = "uv run ruff check src/dgov/pane.py tests/test_pane_unit.py && echo 'Lint OK'"
