[units.state-machine.spec]
prompt = """
You are implementing the State Machine — formal pane lifecycle with valid transitions.

## CLANKER DISCIPLINE (enforce strictly):
1. **Discriminated unions over optional bags**: TransitionResult has mutually exclusive valid/invalid states
2. **Derive, don't store**: Valid transitions are derived from a transition table, not stored flags
3. **Make wrong states impossible**: Invalid transitions return error, never silently succeed
4. **Data over procedure**: Transitions defined as data table, not if-chains

## Interface Contract:
```python
from dataclasses import dataclass
from typing import Final

# Pane lifecycle states
STATES: Final[list[str]] = [
    "pending",      # created, not yet dispatched
    "dispatched",   # assigned to agent, waiting to start
    "running",      # agent actively working
    "paused",       # temporarily suspended
    "done",         # completed successfully
    "failed",       # error or failure
    "closed",       # terminal, archival
]

@dataclass(frozen=True)
class TransitionResult:
    valid: bool
    # Exactly one of these is set based on valid:
    new_state: str | None      # set if valid=True
    previous_state: str | None # set if valid=True
    error: str | None          # set if valid=False
    trigger: str | None        # optional metadata

class StateMachine:
    def __init__(self, custom_rules: dict[tuple[str, str], str] | None = None) -> None:
        """
        Initialize with default rules + optional custom transitions.
        
        Args:
            custom_rules: Optional dict mapping (from_state, trigger) -> to_state
                         These augment (not replace) default rules.
        """
        ...
    
    def get_valid_targets(self, from_state: str) -> list[str]:
        """Return all states reachable from from_state in one transition."""
        ...
    
    def can_transition(self, from_state: str, to_state: str) -> bool:
        """Check if transition is valid (ignores trigger)."""
        ...
    
    def transition(
        self,
        entity_id: str,      # for error messages/context
        from_state: str,
        to_state: str,
        trigger: str | None = None,
    ) -> TransitionResult:
        """
        Attempt state transition.
        
        Returns TransitionResult:
        - valid=True: new_state and previous_state set, error=None
        - valid=False: error set, new_state=None, previous_state=None
        """
        ...
    
    def get_state_path(self, from_state: str, to_state: str) -> list[str] | None:
        """
        Return shortest path from from_state to to_state as list of states.
        Returns None if no path exists.
        Example: pending -> done might return ["pending", "dispatched", "running", "done"]
        """
        ...
```

## Default Transition Rules (data table, not if-chains):
```python
DEFAULT_TRANSITIONS: dict[tuple[str, str], str] = {
    # (from_state, trigger) -> to_state
    ("pending", "dispatch"): "dispatched",
    ("dispatched", "start"): "running",
    ("running", "pause"): "paused",
    ("running", "complete"): "done",
    ("running", "fail"): "failed",
    ("paused", "resume"): "running",
    ("paused", "timeout"): "failed",
    # closed is terminal: any state -> closed via "close" trigger
    ("pending", "close"): "closed",
    ("dispatched", "close"): "closed",
    ("running", "close"): "closed",
    ("paused", "close"): "done",
    ("done", "close"): "closed",
    ("failed", "close"): "closed",
}
```

## Implementation Requirements:
- Transition table as dict: (from_state, trigger) -> to_state
- can_transition() checks if any trigger leads to to_state from from_state
- get_valid_targets() returns unique destinations from a state
- get_state_path() uses BFS to find shortest path through state graph
- All methods are pure (no mutation of internal state, StateMachine is stateless logic)

## Files to Create:
1. `test_project/src/state_machine.py` — implementation
2. `test_project/src/state_machine_test.py` — tests:
   - `test_valid_transitions_succeed()` — all default transitions work
   - `test_invalid_transition_fails()` — invalid returns error, no state change
   - `test_closed_terminal_state()` — closed has no outgoing transitions
   - `test_custom_rules_augment_defaults()` — custom rules work alongside defaults
   - `test_get_valid_targets()` — correct reachable states from each state
   - `test_get_state_path()` — shortest path finding works
   - `test_all_states_reachable_from_pending()` — can reach done/failed/closed from start
3. `test_project/docs/state_machine.md` — interface docs

## Steps:
1. Implement StateMachine with data-driven transitions
2. Write comprehensive tests
3. Document interface
4. Run tests: `cd test_project && uv run pytest src/state_machine_test.py -v`
5. git add test_project/src/state_machine.py test_project/src/state_machine_test.py test_project/docs/state_machine.md
6. git commit -m "Implement State Machine: formal pane lifecycle with data-driven transitions"
"""

