prompt = """
You are implementing the Projection Engine — read models derived from the Event Journal.

## CLANKER DISCIPLINE (enforce strictly):
1. **Derive, don't store**: Projection state is always derived from events. The "stored" projection is a cache that can be rebuilt.
2. **Function contracts**: Handlers are pure functions: (Event, State) -> State. No side effects in handlers.
3. **Make wrong states impossible**: Projection tracks last_sequence_processed; cannot query state if not caught up.

## Interface Contract:
```python
from dataclasses import dataclass
from typing import Callable
from src.event_journal import EventJournal, Event

@dataclass
class ProjectionState:
    """Internal state of a projection"""
    name: str
    last_sequence: int      # last event processed
    data: dict              # projection-specific derived state

# Handler type: pure function, no side effects
ProjectionHandler = Callable[[Event, dict], dict]

class ProjectionEngine:
    def __init__(self, journal: EventJournal, state_dir: str | None = None) -> None:
        """
        Initialize projection engine.
        
        Args:
            journal: EventJournal to read events from
            state_dir: Optional directory to persist projection states (JSON files)
        """
        ...
    
    def register(
        self,
        name: str,
        handler: ProjectionHandler,
    ) -> None:
        """Register a projection with its event handler."""
        ...
    
    def catch_up(self, name: str | None = None) -> dict[str, int]:
        """
        Process new events for all projections (or named projection).
        
        Returns: {projection_name: events_processed_count}
        """
        ...
    
    def get_state(self, name: str) -> dict:
        """
        Get current derived state of a projection.
        
        Raises: KeyError if projection not registered
        """
        ...
```

## Implementation Requirements:
- Handlers are pure functions: receive Event and current state dict, return new state dict
- Incremental catch-up: remember last_sequence, only process new events
- State persistence: JSON files in state_dir (optional, in-memory if None)
- No SQLite for projections — state is always reconstructible from events
- Thread-safe during catch_up (journal is source of truth)

## Example Handler (Pane State Projection):
```python
def pane_state_handler(event: Event, state: dict) -> dict:
    """Track pane states from events"""
    panes = state.get("panes", {})
    
    if event.event_type == "pane_created":
        panes[event.payload["pane_id"]] = "pending"
    elif event.event_type == "pane_dispatched":
        panes[event.payload["pane_id"]] = "dispatched"
    elif event.event_type == "pane_completed":
        panes[event.payload["pane_id"]] = "done"
    
    return {"panes": panes, "total": len(panes)}
```

