[units.command-handler.spec]
prompt = """
You are implementing the Command Handler — validates commands and emits events.

## CLANKER DISCIPLINE (enforce strictly):
1. **Discriminated unions over optional bags**: CommandResult has mutually exclusive success/error, not optional fields
2. **Function contracts**: Validators are pure (input -> bool, no side effects). Commands execute or fail atomically.
3. **Make wrong states impossible**: Failed command never emits event. Successful command emits exactly one event.

## Interface Contract:
```python
from dataclasses import dataclass
from typing import Callable
from src.event_journal import EventJournal, Event

# Result type: discriminated union via success flag
@dataclass(frozen=True)
class CommandResult:
    success: bool
    # Exactly one of these is set based on success:
    event: Event | None        # set if success=True
    error: str | None          # set if success=False
    sequence: int | None     # set if success=True

# Validator type: pure function
Validator = Callable[[dict], tuple[bool, str | None]]  # (is_valid, error_or_none)

class CommandHandler:
    def __init__(self, journal: EventJournal) -> None:
        """Initialize with EventJournal for event emission."""
        ...
    
    def register(
        self,
        command_type: str,
        event_type: str,
        validator: Validator,
    ) -> None:
        """
        Register a command type with its validator and resulting event type.
        
        Validator returns (True, None) for valid, (False, error_message) for invalid.
        """
        ...
    
    def execute(
        self,
        command_type: str,
        payload: dict,
        idempotency_key: str | None = None,
    ) -> CommandResult:
        """
        Execute a command: validate, then emit event if valid.
        
        Flow:
        1. Look up validator for command_type
        2. Run validator(payload) -> (is_valid, error)
        3. If invalid: return CommandResult(success=False, error=error, event=None, sequence=None)
        4. If valid: emit event to journal, return CommandResult(success=True, event=event, sequence=seq, error=None)
        """
        ...
```

## Implementation Requirements:
- Validators run BEFORE any side effects (journal.append)
- Failed validation: no event emitted, error in result
- Success: exactly one event emitted, event + sequence in result
- Idempotency key passed through to journal (for automatic deduplication)
- Pure validators: no I/O, no mutation of external state

## Built-in Commands (pre-registered):
```python
# "create_pane" -> emits "pane_created"
def validate_create_pane(payload: dict) -> tuple[bool, str | None]:
    required = ["pane_id", "agent", "task_spec"]
    missing = [f for f in required if f not in payload]
    if missing:
        return False, f"Missing fields: {missing}"
    return True, None

# "dispatch_pane" -> emits "pane_dispatched"  
def validate_dispatch_pane(payload: dict) -> tuple[bool, str | None]:
    if "pane_id" not in payload:
        return False, "Missing pane_id"
    return True, None

# "close_pane" -> emits "pane_closed"
def validate_close_pane(payload: dict) -> tuple[bool, str | None]:
    if "pane_id" not in payload:
        return False, "Missing pane_id"
    if payload.get("reason") not in ["completed", "failed", "cancelled"]:
        return False, "Invalid reason: must be completed, failed, or cancelled"
    return True, None
```

