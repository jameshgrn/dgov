[units.event-journal.spec]
prompt = """
You are implementing the Event Journal module — the write-model of the event sourcing system.

## CLANKER DISCIPLINE (enforce strictly):
1. **Discriminated unions over optional bags**: Event type must encode its structure, not a grab-bag of optional fields
2. **Derive, don't store**: sequence numbers derive from append order; timestamps derive from wall clock at append time
3. **Make wrong states impossible**: DuplicateEventError is raised, never silent ignore
4. **Function contracts**: append() either succeeds (returns int) or raises (never returns None on error)

## Interface Contract:
```python
from dataclasses import dataclass
from datetime import datetime

@dataclass(frozen=True)  # immutable events
class Event:
    sequence: int           # monotonic, starts at 1
    event_type: str
    payload: dict
    idempotency_key: str | None
    timestamp: datetime

class DuplicateEventError(Exception):
    """Raised when idempotency_key already exists"""
    pass

class EventJournal:
    def __init__(self, db_path: str) -> None:
        """Initialize journal with SQLite at db_path. Creates tables if needed."""
        ...
    
    def append(
        self,
        event_type: str,
        payload: dict,
        idempotency_key: str | None = None,
    ) -> int:
        """
        Append event to journal.
        
        Returns: sequence number (int >= 1)
        Raises: DuplicateEventError if idempotency_key exists
        """
        ...
    
    def get_events(
        self,
        after_sequence: int = 0,
        limit: int = 100,
    ) -> list[Event]:
        """Read events after given sequence (exclusive)."""
        ...
    
    def get_by_idempotency(self, key: str) -> Event | None:
        """Lookup event by idempotency key. Returns None if not found."""
        ...
```

## Implementation Requirements:
- SQLite with WAL mode enabled (PRAGMA journal_mode=WAL)
- Schema: events(sequence INTEGER PRIMARY KEY AUTOINCREMENT, event_type TEXT, payload JSON TEXT, idempotency_key TEXT UNIQUE, timestamp TEXT ISO8601)
- Thread-safe: use connection-per-thread or proper locking
- Frozen dataclass for Event (immutable)
- JSON serialization for payload (json.dumps/json.loads)

## Files to Create:
1. `test_project/src/event_journal.py` — implementation
2. `test_project/src/event_journal_test.py` — comprehensive tests:
   - `test_append_returns_sequence()` — basic append
   - `test_sequence_monotonic()` — sequences 1, 2, 3...
   - `test_duplicate_idempotency_key_raises()` — DuplicateEventError
   - `test_get_events_pagination()` — after_sequence + limit
   - `test_get_by_idempotency()` — lookup by key
   - `test_thread_safety()` — concurrent appends, all succeed, no duplicates
3. `test_project/docs/interfaces.md` — interface documentation for other workers

## Steps:
1. Create directory structure: mkdir -p test_project/src test_project/docs test_project/tests
2. Implement EventJournal with strict contract
3. Write comprehensive tests
4. Document interface
5. Run tests: `cd test_project && uv run pytest src/event_journal_test.py -v`
6. git add test_project/
7. git commit -m "Implement Event Journal: append-only event log with idempotency"
"""

