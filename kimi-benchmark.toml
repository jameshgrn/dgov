### test_full_pane_lifecycle()
Create pane -> dispatch -> run -> done, verify projection tracks correctly.
```python
def test_full_pane_lifecycle(tmp_path):
    # Setup
    journal = EventJournal(str(tmp_path / "events.db"))
    projections = ProjectionEngine(journal, str(tmp_path / "projections"))
    commands = CommandHandler(journal)
    state_machine = StateMachine()
    
    # Register projection
    projections.register("pane_states", pane_state_handler)
    
    # Step 1: Create pane
    result = commands.execute("create_pane", {"pane_id": "p1", "agent": "qwen", "task_spec": "test"})
    assert result.success
    assert result.event.event_type == "pane_created"
    
    # Catch up and verify
    projections.catch_up("pane_states")
    state = projections.get_state("pane_states")
    assert state["panes"]["p1"] == "pending"
    
    # Step 2: Dispatch (would need custom command or direct state machine usage)
    # ... continue through lifecycle
```

### test_concurrent_pane_creation()
Create 10 panes rapidly, verify all events have unique sequences, projection catches up.

### test_invalid_command_no_event()
Attempt invalid command (missing required field), verify:
- CommandResult.success == False
- No event in journal (check by sequence count)
- Projection unchanged

### test_state_machine_rejects_invalid_transition()
Try to transition pending -> done directly, verify StateMachine rejects it.

### test_idempotency_prevents_duplicates()
Execute same command with same idempotency_key twice:
- First succeeds, returns event
- Second returns same event, no duplicate in journal
- Verify by checking journal.get_events() count

### test_event_journal_durability()
Create events, close journal, reopen new instance with same db path:
- All events still readable
- Projection can catch up from beginning
- State reconstructs correctly

### test_projection_incremental_catch_up()
Create events, catch up projection, create more events:
- Second catch_up only processes new events
- Verify by checking last_sequence in projection state

