# Live Smoke Test: Canonical Pipe Synchronization
# Proves: real pipe, runner settlement, status cleanup stay synchronized

[dag]
name = "live-pipe-smoke"
max_concurrent = 1

[[task]]
slug = "pipe-signal-test"
summary = "Live pipe signal test - proves canonical pipe works across process boundaries"
prompt = """
This is a live smoke test for the canonical event pipe.

Your task:
1. Read the event pipe path from the environment variable DGOV_EVENT_PIPE
2. Write a valid pane_done event to that pipe in JSON format:
   {"type": "pane_done", "task_slug": "pipe-signal-test", "pane_slug": "<your pane slug>", "exit_code": 0}
3. Create a file named "live-pipe-proof.txt" with content "pipe works"
4. Stage and commit both the signal and the proof file

The pipe path is provided in DGOV_EVENT_PIPE environment variable.
Write the JSON event as a single line followed by newline.
"""
agent = "mock"
commit_message = "Live pipe smoke test proof"

[task.files]
create = ["live-pipe-proof.txt"]

[[task]]
slug = "pipe-failure-test"
summary = "Live pipe failure test - proves pane_failed signals work"
depends_on = ["pipe-signal-test"]
prompt = """
This test proves pane_failed events propagate correctly.

Your task:
1. Read DGOV_EVENT_PIPE from environment
2. Write a pane_failed event with exit_code=1:
   {"type": "pane_failed", "task_slug": "pipe-failure-test", "pane_slug": "<your pane slug>", "exit_code": 1, "error": "intentional test failure"}
3. Create "live-pipe-failure-proof.txt" to prove we reached this point
4. Stage and commit

Note: The runner should handle this as a failure and transition to BLOCKED_ON_GOVERNOR.
"""
agent = "mock"
commit_message = "Live pipe failure test proof"

[task.files]
create = ["live-pipe-failure-proof.txt"]

[[eval]]
name = "pipe_created_file_exists"
cmd = "test -f live-pipe-proof.txt && cat live-pipe-proof.txt"
expected = "pipe works"

[[eval]]
name = "status_shows_zero_active"
cmd = "uv run dgov status -r . --json | jq -r '.panes.active'"
expected = "0"
