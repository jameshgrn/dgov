[plan]
version = 1
name = "micro-decompose-lifecycle"
goal = "Decompose lifecycle.py in small steps"
session_root = "/Users/jakegearon/projects/dgov"

[[evals]]
id = "E1"
kind = "regression"
statement = "lifecycle imports still work"
evidence = "uv run python3 -c 'from dgov.lifecycle import create_pane; print(\"OK\")'"

[[evals]]
id = "E2"
kind = "happy_path"
statement = "lifecycle.py is a shim or <500 lines"
evidence = "[ $(wc -l < src/dgov/lifecycle.py) -lt 500 ]"

[[evals]]
id = "EX1"
kind = "happy_path"
statement = "lifecycle/__init__.py exists"
evidence = "test -f src/dgov/lifecycle/__init__.py"

[[evals]]
id = "EX2"
kind = "happy_path"
statement = "lifecycle/metadata.py exists"
evidence = "test -f src/dgov/lifecycle/metadata.py"

[[evals]]
id = "EX3"
kind = "happy_path"
statement = "lifecycle/cleanup.py exists"
evidence = "test -f src/dgov/lifecycle/cleanup.py"

[[evals]]
id = "EX4"
kind = "happy_path"
statement = "lifecycle/create.py exists"
evidence = "test -f src/dgov/lifecycle/create.py"

# Phase 1: Create subpackage structure
[units.create-lifecycle-dir]
summary = "Create lifecycle/ directory with __init__.py"
agent = "kimi-k25"
timeout_s = 300
satisfies = ["EX1"]
commit_message = "chore(lifecycle): create subpackage structure"
prompt = """
Create src/dgov/lifecycle/__init__.py with re-exports:
- create_worker_pane, create_utility_pane from .create
- destroy_pane, cleanup_stale_panes, close_pane from .cleanup  
- pane_meta (or similar) from .metadata

Add __all__ list with all public exports.
No implementation yet - just structure and imports.
Commit when done.
"""

[units.create-lifecycle-dir.files]
create = ["src/dgov/lifecycle/__init__.py"]

# Phase 2: Extract metadata module
[units.extract-metadata]
summary = "Extract metadata.py from lifecycle.py"
agent = "kimi-k25"
deps = ["create-lifecycle-dir"]
timeout_s = 300
satisfies = ["EX2"]
commit_message = "refactor(lifecycle): extract metadata.py"
prompt = """
Read src/dgov/lifecycle.py. Find ALL functions/classes related to:
- Title generation
- Status tracking
- Metadata helpers

Extract them into src/dgov/lifecycle/metadata.py with proper imports.
Update src/dgov/lifecycle/__init__.py to export these.
Commit when done.
"""

[units.extract-metadata.files]
create = ["src/dgov/lifecycle/metadata.py"]
edit = ["src/dgov/lifecycle/__init__.py"]

# Phase 3: Extract cleanup module
[units.extract-cleanup]
summary = "Extract cleanup.py from lifecycle.py"
agent = "kimi-k25"
deps = ["extract-metadata"]
timeout_s = 300
satisfies = ["EX3"]
commit_message = "refactor(lifecycle): extract cleanup.py"
prompt = """
Read src/dgov/lifecycle.py. Find ALL functions related to:
- destroy_pane()
- cleanup_stale_panes()
- close_pane()
- Cleanup helpers

Extract them into src/dgov/lifecycle/cleanup.py with proper imports.
Update src/dgov/lifecycle/__init__.py to export these.
Commit when done.
"""

[units.extract-cleanup.files]
create = ["src/dgov/lifecycle/cleanup.py"]
edit = ["src/dgov/lifecycle/__init__.py"]

# Phase 4: Extract create module
[units.extract-create]
summary = "Extract create.py from lifecycle.py"
agent = "kimi-k25"
deps = ["extract-cleanup"]
timeout_s = 300
satisfies = ["EX4"]
commit_message = "refactor(lifecycle): extract create.py"
prompt = """
Read src/dgov/lifecycle.py. Find ALL functions related to:
- create_worker_pane()
- create_utility_pane()
- _ensure_dependency()
- Creation helpers

Extract them into src/dgov/lifecycle/create.py with proper imports.
Update src/dgov/lifecycle/__init__.py to export these.
Commit when done.
"""

[units.extract-create.files]
create = ["src/dgov/lifecycle/create.py"]
edit = ["src/dgov/lifecycle/__init__.py"]

# Phase 5: Convert to shim
[units.convert-shim]
summary = "Convert lifecycle.py to shim"
agent = "kimi-k25"
deps = ["extract-create"]
timeout_s = 300
satisfies = ["E1", "E2"]
commit_message = "refactor(lifecycle): convert to shim importing from subpackage"
prompt = """
Replace src/dgov/lifecycle.py with a thin shim:
- Import all public functions from the subpackage
- Re-export them for backward compatibility
- Keep under 50 lines

After replacement, run: uv run pytest tests/test_lifecycle*.py -v
If tests pass, commit.
"""

[units.convert-shim.files]
edit = ["src/dgov/lifecycle.py"]
