[project]
name = "dgov"
version = "0.4.0"
description = "Distributed governance for AI coding agents. Orchestrates any CLI agent across git worktrees."
requires-python = ">=3.12"
dependencies = [
    "click>=8.1",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
]

[project.scripts]
dgov = "dgov.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dgov"]

[tool.ruff]
line-length = 99

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "unit: Unit tests (no external deps)",
]
