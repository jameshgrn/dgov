[project]
name = "dgov"
version = "0.7.1"
description = "Distributed governance for AI coding agents. Orchestrates any CLI agent across git worktrees."
requires-python = ">=3.12"
dependencies = [
    "click>=8.1",
]

[dependency-groups]
dev = [
    "ty>=0.0.1",
    "pytest>=8.0",
    "ruff>=0.4",
]
docs = [
    "mkdocs-material>=9.0",
]

[project.scripts]
dgov = "dgov.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dgov"]

[tool.ruff]
line-length = 99

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "unit: Unit tests (no external deps)",
    "integration: End-to-end lifecycle tests with real git repos",
]
