[[evals]]
id = "E-tests-pass"
kind = "regression"
statement = "Unit tests for affected modules still pass"
evidence = "cd /Users/jakegearon/projects/dgov && uv run pytest tests/test_lifecycle.py tests/test_persistence_pane.py -q -m unit --tb=short 2>&1 | tail -1 | grep -q 'passed'"

[units.r159-lifecycle]
summary = "Add _maybe_update_pane_title function to lifecycle.py"
agent = "qwen-35b"
files.edit = ["src/dgov/lifecycle.py"]
prompt = '''
1. Read src/dgov/lifecycle.py and find _build_pane_title (around line 554).

2. Add the following function RIGHT AFTER _build_pane_title:

def _maybe_update_pane_title(session_root: str, slug: str, new_state: str) -> None:
    """Update the pane title after a persisted state change."""
    from dgov.backend import get_backend
    from dgov.persistence import PaneState, get_pane

    # Skip for terminal states — pane is dead, title update would fork tmux for nothing.
    if new_state in (PaneState.MERGED, PaneState.CLOSED, PaneState.SUPERSEDED):
        return

    pane = get_pane(session_root, slug)
    if not pane:
        return

    pane_id = pane.get("pane_id", "")
    agent = pane.get("agent", "")
    project_root = pane.get("project_root", "")
    if not pane_id:
        return

    try:
        title = _build_pane_title(agent, slug, project_root, state=pane.get("state", new_state))
        get_backend().set_title(pane_id, title)
    except (RuntimeError, OSError):
        pass  # pane may already be dead

3. git add src/dgov/lifecycle.py
'''
commit_message = "Move _maybe_update_pane_title from persistence to lifecycle"
satisfies = ["E-no-title-fn-in-persistence", "E-title-update-preserved", "E-ruff-clean"]
depends_on = []

