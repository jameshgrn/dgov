# Plan: Rebuild pane.py with tmux-backed implementation
# Methodical, step-by-step, with explicit commit requirements

[dag]
name = "rebuild-pane-tmux"
max_concurrent = 1

[tasks.pane-rebuild-impl]
summary = "Rebuild pane.py using tmux primitives"
commit_message = "Rebuild pane.py with tmux-backed implementation"
files = { edit = ["src/dgov/pane.py"] }
prompt = """
Rebuild src/dgov/pane.py to use actual tmux primitives.

The current file has stub implementations with TODO comments. Replace them entirely.

YOU MUST IMPLEMENT THESE FUNCTIONS:

1. create_pane(task_slug, prompt, agent, cwd, session_root=None, log_file=None) -> WorkerPane
   - Call tmux.create_background_pane(cwd=cwd, env=env, name=task_slug, agent=agent)
   - Call tmux.configure_worker_pane(pane_id, title=f"[{agent}] {task_slug}", agent=agent, log_file=log_file)
   - Call tmux.wait_for_shell_ready(pane_id, timeout=3.0) - ignore return value, just call it
   - Call tmux.send_command(pane_id, command)
   - Import get_agent from dgov.agents (NOT get_agent_def)
   - If get_agent returns an agent def with command_template, use it; else use fallback
   - Import emit_event from dgov.persistence.events
   - If session_root provided, emit_event(session_root, "pane_created", slug, task_slug=task_slug)
   - Return WorkerPane(slug=..., task_slug=..., state="active", pane_id=..., agent=agent)

2. close_pane(slug, pane_id=None, session_root=None) -> None
   - If pane_id is None, search list_panes() to find it by slug
   - Call tmux.kill_pane(pane_id)
   - If session_root provided, emit_event(session_root, "pane_closed", slug)

3. list_panes() -> list[WorkerPane]
   - Call tmux.bulk_pane_info()
   - Filter panes where title starts with "[" but NOT "[gov]"
   - Parse title format "[agent] task-slug" to extract agent and task_slug
   - Build WorkerPane for each, derive slug from task_slug + pane_id
   - State can be "active" or "unknown" — do NOT implement complex state inference

4. pane_exists(slug) -> bool
   - Call list_panes() and check if any pane.slug == slug

CRITICAL REQUIREMENTS:
- Import get_agent from dgov.agents (function exists, use it)
- Import emit_event from dgov.persistence.events
- Import from dgov import tmux
- Import shlex at top level
- Use logging for errors, don't crash on tmux failures
- Do NOT create your own state inference logic

FINAL STEP (DO NOT SKIP):
1. Read your implementation to verify it compiles
2. Stage: git add src/dgov/pane.py
3. Commit: git commit -m "Rebuild pane.py with tmux-backed implementation"
4. Verify: git log --oneline -1
"""
agent = "worker"

[tasks.pane-unit-tests]
summary = "Write unit tests for pane.py dataclass and pure functions"
depends_on = ["pane-rebuild-impl"]
commit_message = "Add unit tests for pane.py"
files = { create = ["tests/test_pane_unit.py"] }
prompt = """
Write unit tests for src/dgov/pane.py that don't require tmux.

Test these:
1. WorkerPane dataclass with defaults (state="pending", pane_id=None, agent="mock")
2. WorkerPane with all fields populated
3. pane_exists() mocked - test the logic, not tmux
4. Any error handling that can be tested without tmux

Do NOT test:
- Functions that actually call tmux (create_pane, close_pane, list_panes)
- Event emission

Use unittest.mock to mock tmux calls where needed.

CRITICAL - FINAL STEPS:
1. uv run pytest tests/test_pane_unit.py -v (verify tests pass)
2. git add tests/test_pane_unit.py
3. git commit -m "Add unit tests for pane.py"
"""
agent = "worker"

[evals]
pane_py_imports = "uv run python -c 'from dgov.pane import create_pane, close_pane, list_panes, WorkerPane; print(\"Imports OK\")'"
unit_tests_pass = "uv run pytest tests/test_pane_unit.py -v --tb=short 2>&1 | tail -5"
lint_clean = "uv run ruff check src/dgov/pane.py tests/test_pane_unit.py && echo 'Lint OK'"
