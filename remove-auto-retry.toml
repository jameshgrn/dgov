[plan]
version = 1
name = "remove-auto-retry"
goal = "Remove automatic retry system from dgov kernel - failures go straight to BLOCKED_ON_GOVERNOR for governor decision"
session_root = "/Users/jakegearon/projects/dgov"
default_agent = "kimi-k25"

# Problem: Auto-retry causes:
# - Wasted API calls on fundamentally broken tasks
# - Hidden failure patterns (a2 suffix obscures the real issue)
# - Violation of "slow is smooth" principle
#
# Solution: One clean attempt. On failure -> BLOCKED_ON_GOVERNOR.
# Governor decides: DISPATCH (fresh attempt), SKIP, or CLOSE.

[[evals]]
id = "E1"
kind = "regression"
statement = "DAG kernel still compiles and runs"
evidence = "uv run python3 -c 'from dgov.kernel import DagKernel, DagState; k = DagKernel(deps={\"a\": ()}); actions = k.start(); print(len(actions))'"

[[evals]]
id = "E2"
kind = "regression"
statement = "DAG executor still compiles"
evidence = "uv run python3 -c 'from dgov.dag_executor import run_dag_kernel; print(\"OK\")'"

[[evals]]
id = "E3"
kind = "happy_path"
statement = "No RetryTask action type exists"
evidence = "grep -c 'RetryTask' src/dgov/kernel.py | xargs test 0 -eq"

[[evals]]
id = "E4"
kind = "happy_path"
statement = "Kernel max_retries defaults to 0"
evidence = "grep 'max_retries: int' src/dgov/kernel.py | grep '= 0'"

[units.kernel-remove-retry]
summary = "Remove auto-retry from DagKernel - set max_retries=0, remove retry event handlers"
agent = "kimi-k25"
timeout_s = 300
satisfies = ["E1", "E3", "E4"]
commit_message = "Remove auto-retry from kernel - failures go to BLOCKED_ON_GOVERNOR"
files = { edit = ["src/dgov/kernel.py"] }
prompt = """
1. Read src/dgov/kernel.py
2. Change `max_retries: int = 3` to `max_retries: int = 0` in DagKernel class
3. Remove RetryTask from DagAction union type (around line 110)
4. Remove the retry handling in handle() method (around lines 381, 410, 441 that check curr_attempt <= self.max_retries)
5. For those locations, change to: emit BLOCKED_ON_GOVERNOR instead of RetryTask

The kernel should never auto-retry. On any failure (dispatch, wait, review), transition to BLOCKED_ON_GOVERNOR state.

6. git add src/dgov/kernel.py
7. git commit -m "Remove auto-retry from kernel - failures go to BLOCKED_ON_GOVERNOR"
"""

[units.executor-remove-retry]
summary = "Remove _dag_retry function from dag_executor.py and RetryTask handling"
agent = "kimi-k25"
timeout_s = 300
depends_on = ["kernel-remove-retry"]
satisfies = ["E2", "E3"]
commit_message = "Remove RetryTask handling from dag executor"
files = { edit = ["src/dgov/dag_executor.py"] }
prompt = """
1. Read src/dgov/dag_executor.py
2. Find and remove the _dag_retry function (around line 782)
3. Remove RetryTask from imports at top of file
4. Remove the isinstance(action, RetryTask) handling in the action dispatcher (around line 124)
5. git add src/dgov/dag_executor.py
6. git commit -m "Remove RetryTask handling from dag executor"
"""

[units.cleanup-recovery]
summary = "Clean up unused retry functions from recovery.py (keep retry_or_escalate for manual use)"
agent = "kimi-k25"
timeout_s = 300
depends_on = ["executor-remove-retry"]
satisfies = ["E2"]
commit_message = "Clean up unused auto-retry imports from recovery.py"
files = { edit = ["src/dgov/recovery.py"] }
prompt = """
1. Read src/dgov/recovery.py
2. The retry_or_escalate function can stay (used for manual governor-initiated retry)
3. Remove any imports or helper functions that were only used for auto-retry
4. Check if _schedule_retry or similar internal-only functions can be removed
5. git add src/dgov/recovery.py
6. git commit -m "Clean up unused auto-retry imports from recovery.py"
"""
