[plan]
version = 1
name = "remove-plan-wait-flags"
goal = "Remove blocking --wait flags from plan run/resume/scaffold commands"
default_agent = "worker"
max_retries = 1

[[evals]]
id = "no-wait-flags"
kind = "invariant"
statement = "All --wait options removed from plan commands"
evidence = """
python3 -c "
import re
with open('src/dgov/cli/plan_cmd.py') as f:
    content = f.read()
for cmd in ['plan_run', 'plan_resume', 'plan_scaffold']:
    pattern = rf'@{cmd}\\.command.*?def {cmd}\\('
    match = re.search(pattern, content, re.DOTALL)
    if match:
        func_start = match.start()
        func_section = content[func_start:func_start+2000]
        if '--wait' in func_section:
            print(f'FAIL: --wait still in {cmd}')
            exit(1)
print('OK')
" 2>&1
"""

[units.remove-wait-flags]
summary = "Remove blocking --wait flags from all plan commands"
commit_message = "Remove blocking --wait flags from plan commands"
files = { edit = ["src/dgov/cli/plan_cmd.py"] }
satisfies = ["no-wait-flags"]
prompt = """
1. Read src/dgov/cli/plan_cmd.py completely
2. Remove the --wait flag from plan_run function:
   - Delete the @click.option("--wait", ...) line and the help text
   - Remove wait parameter from function signature
   - Remove the if not wait: return and _wait_for_dag(run_id) lines at the end

3. Remove the --wait flag from plan_resume function:
   - Delete the @click.option("--wait", ...) line
   - Remove wait parameter from function signature
   - Remove the if not wait: return and _wait_for_dag(new_run_id) lines

4. Remove the --wait flag from plan_scaffold function:
   - Delete the @click.option("--wait", "wait_for_run", ...) line
   - Remove wait_for_run parameter from function signature
   - In _scaffold_and_run function, remove the wait parameter and the if not wait: return logic

5. Remove the entire _wait_for_dag function since it's no longer used

6. Update Examples in docstrings to remove --wait references:
   - Remove "dgov plan run .dgov/plans/my-plan.toml --wait"
   - Remove "dgov plan resume .dgov/plans/my-plan.toml --wait"
   - Remove "--wait" from the scaffold example

7. git add src/dgov/cli/plan_cmd.py
8. git commit with the provided message
"""
