[plan]
name = "remove-tunnel"
description = "Remove all river tunnel-related code from dgov - infrastructure-specific and not part of canonical policy"

[[tasks]]
name = "remove-tunnel-preflight"
description = "Remove river tunnel functions from preflight.py"
agent = "worker"
touches = ["src/dgov/preflight.py"]
prompt = """
Remove all river tunnel-related code from src/dgov/preflight.py:

1. Delete the entire `check_river_tunnel()` function (lines ~589-633)
2. Delete the entire `_fix_river_tunnel()` function (lines ~770-780)
3. Remove the tunnel check call in `run_preflight()` - delete these lines:
   ```
   if agent.startswith("river-") or "river" in agent:
       checks.append(check_river_tunnel())
   ```
4. Remove "river_tunnel" from `_FIXER_NAMES` set
5. Remove the "river_tunnel" entry from `FIXER_REGISTRY` dict
6. In `fix_preflight()`, remove the special handling block for river_tunnel (the if check.name == "river_tunnel": block that does extra rechecks)

Read the file first, then make these deletions carefully. Do not change any other code.

After editing:
- git add src/dgov/preflight.py
- git commit -m "Remove river tunnel infrastructure-specific code from preflight"
"""

[[tasks]]
name = "remove-tunnel-tests"
description = "Remove river tunnel imports and references from tests"
agent = "worker"
touches = ["tests/test_dgov_preflight.py"]
depends_on = ["remove-tunnel-preflight"]
prompt = """
Remove river tunnel references from tests/test_dgov_preflight.py:

1. Remove `check_river_tunnel` from the imports (line with the other preflight imports)
2. Remove `_fix_river_tunnel` from the imports
3. Find and remove all test mock registries that include "river_tunnel" entries
   - Look for patterns like: `"river_tunnel": (_fix_river_tunnel, check_river_tunnel)`
   - This appears in test_fix_preflight_deps and similar test functions
   - Just remove the "river_tunnel" key-value pair from those dicts, leave the rest

Read the file first, then make these changes.

After editing:
- git add tests/test_dgov_preflight.py
- git commit -m "Remove river tunnel test references"
"""

[[tasks]]
name = "run-tests"
description = "Run preflight tests to verify changes"
agent = "worker"
touches = []
depends_on = ["remove-tunnel-tests"]
prompt = """
Run the preflight tests to verify the tunnel removal worked:

```bash
uv run pytest tests/test_dgov_preflight.py -q -m unit
```

If tests pass, report success. If they fail, report the failure output.
"""
