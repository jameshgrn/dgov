name = "research-report"
description = "Standard reporting format for tiny-model research experiments"
template = """
# Research Report

1. Experiment Family Name: {{family_name}}
2. Hypothesis: {{hypothesis}}
3. What Was Changed: {{changes}}
4. Quantitative Result: {{result}}
5. Qualitative Behavioral Notes: {{behavior}}
6. Is This Surprising? {{surprising}}
7. Confidence Level: {{confidence}}
8. Recommended Next Branches: {{next_steps}}
9. Possible Artifact Risks: {{risks}}
10. Minimal Reproduction Spec: {{repro_spec}}

Please fulfill this report for each experiment you complete.
"""
required_vars = ["family_name", "hypothesis", "changes", "result", "behavior", "surprising", "confidence", "next_steps", "risks", "repro_spec"]
default_agent = "pi"
