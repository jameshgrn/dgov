[plan]
version = 1
name = "sentrux-convergence-dogfood"
goal = "Break import cycles in the core dogfood loop (plan→dispatch→execute→review→merge) to achieve convergence"
session_root = "/Users/jakegearon/projects/dgov"
default_agent = "kimi-k25"

# Convergence targets:
# - Cycles: 19 → 0 (break all cycles in dogfood path)
# - Depth: 22 → ≤15 (flatten critical path)
# - God files: 23 → <10 (prioritize dogfood path files)

# The dogfood path: plan → dag → dispatch → lifecycle → tmux → worker → review → merge
# Critical modules in this path:
#   dag_executor.py (41 fan-out), lifecycle.py (28 fan-out), router.py, status.py, persistence.py

[[evals]]
id = "E1"
kind = "regression"
statement = "All imports still work after cycle breaking"
evidence = "uv run python3 -c 'from dgov.lifecycle import create_worker_pane, close_worker_pane; from dgov.router import dispatch; from dgov.status import get_status; print(\"OK\")'"

[[evals]]
id = "E2"
kind = "regression"
statement = "Plan execution still works"
evidence = "uv run dgov plan dry-run .dgov/plans/test-smoke.toml 2>&1 | grep -q 'plan validated'"

[[evals]]
id = "E3"
kind = "happy_path"
statement = "No new cycles introduced in dogfood path"
evidence = "uv run python3 scripts/sentrux_lite.py 2>&1 | grep -E '(lifecycle|tmux|router|status|dag_executor).*->.*(lifecycle|tmux|router|status|dag_executor)' | wc -l | xargs test 0 -eq"

[[evals]]
id = "E4"
kind = "happy_path"
statement = "Import depth for dogfood path reduced"
evidence = "uv run python3 -c 'import json; d=json.load(open(\".sentrux/current.json\")); print(f\"depth: {d[\"max_depth\"]}\"); assert d[\"max_depth\"] <= 18, f\"depth {d[\"max_depth\"]} > 18\"'"

# === PHASE 1: BREAK status ↔ observation CYCLE ===
# Root cause: status.py imports observation.py for WorkerPhase, WorkerObservation
# Solution: Move WorkerPhase and WorkerObservation to a pure types module

[units.extract-observation-types]
summary = "Extract WorkerPhase, WorkerObservation to pure types module to break status→observation cycle"
agent = "kimi-k25"
timeout_s = 600
satisfies = ["E1", "E4"]
commit_message = "Extract observation types to break status-observation import cycle"
prompt = """
Goal: Break the status.py → observation.py import cycle by extracting pure types.

The cycle:
  status.py → observation.py (imports WorkerPhase, WorkerObservation)
  observation.py → provider_registry → decision_providers → inspection → status.py

Steps:
1. Read src/dgov/observation.py. Find WorkerPhase and WorkerObservation dataclasses.
   These are pure data types with no behavior.

2. Create src/dgov/types.py with:
   - WorkerPhase enum (or StrEnum)
   - WorkerObservation dataclass with all its fields
   - Any other pure types needed (WorkerState, WorkerStatus if they exist)
   - Keep imports minimal (typing, datetime, enum only)

3. In observation.py:
   - Import WorkerPhase, WorkerObservation from dgov.types instead of defining them
   - Remove the original definitions
   - Re-export for backward compatibility: `from dgov.types import WorkerPhase, WorkerObservation`

4. In status.py:
   - Find where it imports from observation.py
   - Change to: from dgov.types import WorkerPhase, WorkerObservation

5. Run: uv run python3 -c "from dgov.types import WorkerPhase, WorkerObservation; print('OK')"
6. Run: uv run ruff check src/dgov/types.py src/dgov/observation.py src/dgov/status.py
7. Run: uv run ruff format src/dgov/types.py src/dgov/observation.py src/dgov/status.py

git add src/dgov/types.py src/dgov/observation.py src/dgov/status.py
git commit -m "Extract observation types to break status-observation import cycle"
"""

[units.extract-observation-types.files]
create = ["src/dgov/types.py"]
edit = ["src/dgov/observation.py", "src/dgov/status.py"]

# === PHASE 2: BREAK persistence ↔ spans CYCLE ===
# Root cause: persistence.py imports spans.py, spans.py imports persistence.py
# Solution: Defer spans import in persistence or extract shared types

[units.break-persistence-spans-cycle]
summary = "Break persistence.py → spans.py import cycle with deferred import"
agent = "kimi-k25"
timeout_s = 600
depends_on = ["extract-observation-types"]
satisfies = ["E1", "E4"]
commit_message = "Break persistence-spans import cycle with deferred imports"
prompt = """
Goal: Break the persistence.py ↔ spans.py import cycle.

The cycle:
  persistence.py → spans.py
  spans.py → persistence.py

Steps:
1. Read src/dgov/persistence.py. Find all imports from dgov.spans.
   Look for: `from dgov.spans import ...` or `import dgov.spans`

2. Read src/dgov/spans.py. Find all imports from dgov.persistence.

3. The cycle is likely:
   - persistence imports spans for some function
   - spans imports persistence for event reading/writing

4. In persistence.py, convert top-level spans imports to function-level imports.
   Change:
     from dgov.spans import X
   To:
     def some_function():
         from dgov.spans import X
         ...

5. Verify the cycle is broken:
   uv run python3 -c "from dgov.persistence import PaneState; print('OK')"
   uv run python3 -c "from dgov.spans import Span; print('OK')"

6. Run: uv run ruff check src/dgov/persistence.py src/dgov/spans.py
7. Run: uv run ruff format src/dgov/persistence.py src/dgov/spans.py

git add src/dgov/persistence.py src/dgov/spans.py
git commit -m "Break persistence-spans import cycle with deferred imports"
"""

[units.break-persistence-spans-cycle.files]
edit = ["src/dgov/persistence.py", "src/dgov/spans.py"]

# === PHASE 3: BREAK router CYCLES ===
# router.py is at the center of many cycles
# It imports: status, persistence, spans, agents
# And is imported by: plan, templates, lifecycle, preflight

[units.flatten-router-imports]
summary = "Flatten router.py imports to break router-centric cycles"
agent = "kimi-k25"
timeout_s = 600
depends_on = ["break-persistence-spans-cycle"]
satisfies = ["E1", "E3", "E4"]
commit_message = "Flatten router imports to break router-centric cycles"
prompt = """
Goal: Break router.py cycles by deferring non-essential imports.

router.py imports (cycle analysis):
  - status (causes router → status → ... → router)
  - persistence (causes router → persistence → spans → router)
  - agents (causes router → agents → ... → router)

router.py is imported by:
  - plan → templates → router (causes cycle back to plan)

Steps:
1. Read src/dgov/router.py thoroughly. Identify all dgov imports at top level.

2. Identify which imports are ONLY used in specific functions, not module-level.
   Look for patterns:
   - `from dgov.status import ...` → used only in dispatch functions?
   - `from dgov.persistence import ...` → used only in one function?
   - `import dgov.agents` → used only in agent resolution?

3. Convert function-local imports for:
   - dgov.status imports (move to functions that use status)
   - dgov.persistence imports (unless used at module level)
   - dgov.agents imports (move to agent resolution function)

4. For plan/templates → router → cycle:
   - The cycle is: plan → templates → router → status → pane_executor → lifecycle → ??? → plan
   - Check if templates.py can defer router import or use TYPE_CHECKING

5. In templates.py:
   - Check if router is only used in type annotations
   - If so, use: `from typing import TYPE_CHECKING`
   - And: `if TYPE_CHECKING: from dgov.router import ...`

6. Run: uv run python3 -c "from dgov.router import dispatch; print('OK')"
7. Run: uv run ruff check src/dgov/router.py src/dgov/templates.py
8. Run: uv run ruff format src/dgov/router.py src/dgov/templates.py

git add src/dgov/router.py src/dgov/templates.py
git commit -m "Flatten router imports to break router-centric cycles"
"""

[units.flatten-router-imports.files]
edit = ["src/dgov/router.py", "src/dgov/templates.py"]

# === PHASE 4: BREAK lifecycle CYCLES ===
# lifecycle.py is in the critical dogfood path and has cycles with:
# - recovery (direct: lifecycle ↔ recovery)
# - tmux → monitor → dispatch_executor → lifecycle
# - agents → router → ... → lifecycle

[units.break-lifecycle-cycles]
summary = "Break lifecycle.py cycles with deferred imports and type checking guards"
agent = "kimi-k25"
timeout_s = 600
depends_on = ["flatten-router-imports"]
satisfies = ["E1", "E3", "E4"]
commit_message = "Break lifecycle cycles with deferred imports"
prompt = """
Goal: Break lifecycle.py cycles which are critical to the dogfood loop.

lifecycle.py cycles (from sentrux analysis):
  1. lifecycle ↔ recovery (direct cycle)
  2. lifecycle → tmux → monitor → dispatch_executor → lifecycle
  3. lifecycle → agents → router → ... → lifecycle
  4. lifecycle → pane_executor → ... → lifecycle (through status)

Steps:
1. Read src/dgov/lifecycle.py thoroughly. Identify ALL dgov imports.

2. For the lifecycle ↔ recovery cycle:
   - Which functions in lifecycle import recovery?
   - Move those imports to function-level

3. For lifecycle → tmux → monitor → dispatch_executor → lifecycle:
   - This is complex because lifecycle creates panes (needs tmux)
   - tmux creates monitor panes (needs monitor)
   - monitor dispatches (needs dispatch_executor)
   - dispatch_executor needs lifecycle for cleanup
   - Solution: use TYPE_CHECKING for type annotations, defer runtime imports

4. Identify all imports in lifecycle.py that are ONLY used for:
   - Type annotations (move to TYPE_CHECKING block)
   - Single function calls (move to function-level)

5. Add TYPE_CHECKING guard:
   ```python
   from typing import TYPE_CHECKING
   if TYPE_CHECKING:
       from dgov.recovery import RecoveryState
       from dgov.monitor import Monitor
       # etc for type-only imports
   ```

6. For imports used at runtime but only in specific functions:
   Move them inside those functions (deferred import pattern).

7. Priority order for deferring:
   - dgov.recovery (breaks direct cycle)
   - dgov.monitor (breaks cycle through tmux)
   - dgov.dispatch_executor (breaks cycle)
   - dgov.agents (reduces fan-out)

8. Run: uv run python3 -c "from dgov.lifecycle import create_worker_pane; print('OK')"
9. Run: uv run ruff check src/dgov/lifecycle.py
10. Run: uv run ruff format src/dgov/lifecycle.py

git add src/dgov/lifecycle.py
git commit -m "Break lifecycle cycles with deferred imports"
"""

[units.break-lifecycle-cycles.files]
edit = ["src/dgov/lifecycle.py"]

# === PHASE 5: BREAK provider_registry ↔ decision_providers ↔ observation CYCLE ===
[units.break-provider-decision-cycle]
summary = "Break provider_registry ↔ decision_providers ↔ observation cycle"
agent = "kimi-k25"
timeout_s = 600
depends_on = ["break-lifecycle-cycles"]
satisfies = ["E1", "E3", "E4"]
commit_message = "Break provider-decision-observation cycle"
prompt = """
Goal: Break provider_registry → decision_providers → observation → provider_registry cycle.

This cycle involves:
  provider_registry → decision_providers
  decision_providers → observation (likely for WorkerObservation)
  observation → provider_registry (for provider lookup)

Steps:
1. Read src/dgov/provider_registry.py. Find imports from decision_providers.

2. Read src/dgov/decision_providers.py. Find imports from observation.
   - Likely imports WorkerObservation which we moved to types.py
   - If so, change: from dgov.types import WorkerObservation

3. Read src/dgov/observation.py. Find imports from provider_registry.
   - Likely for looking up providers
   - Can be deferred to function level

4. Make changes:
   - In decision_providers.py: change observation import to types import
   - In observation.py: defer provider_registry imports to function level

5. Run: uv run python3 -c "from dgov.provider_registry import get_provider; print('OK')"
6. Run: uv run ruff check src/dgov/provider_registry.py src/dgov/decision_providers.py src/dgov/observation.py
7. Run: uv run ruff format src/dgov/provider_registry.py src/dgov/decision_providers.py src/dgov/observation.py

git add src/dgov/provider_registry.py src/dgov/decision_providers.py src/dgov/observation.py
git commit -m "Break provider-decision-observation cycle"
"""

[units.break-provider-decision-cycle.files]
edit = ["src/dgov/provider_registry.py", "src/dgov/decision_providers.py", "src/dgov/observation.py"]

# === PHASE 6: FLATTEN dag_executor (highest fan-out: 41) ===
[units.reduce-dag-executor-fanout]
summary = "Reduce dag_executor.py fan-out from 41 to <20 by deferring non-critical imports"
agent = "kimi-k25"
timeout_s = 600
depends_on = ["break-provider-decision-cycle"]
satisfies = ["E1", "E4"]
commit_message = "Reduce dag_executor fan-out with deferred imports"
prompt = """
Goal: Reduce dag_executor.py fan-out from 41 to under 20.

dag_executor.py has 41 imports from dgov modules - highest in the codebase.
This creates deep dependency chains and increases import depth.

Steps:
1. Read src/dgov/dag_executor.py. List all `from dgov import` and `from dgov.X import` statements.

2. Categorize each import:
   - Used at module level (must stay top-level)
   - Used only in type annotations (move to TYPE_CHECKING)
   - Used only in specific functions (move to function-level)

3. For TYPE_CHECKING imports:
   ```python
   from typing import TYPE_CHECKING
   if TYPE_CHECKING:
       from dgov.lifecycle import WorkerResult
       from dgov.merger import MergeSuccess
       # ... other type-only imports
   ```

4. For function-level imports:
   Move import statement inside the function that uses it.
   Example:
     def run_complete_pane():
         from dgov.merger import merge_to_main
         # use merge_to_main
   
   This breaks the import chain at runtime while preserving functionality.

5. Priority: defer imports from these high-fan-out modules first:
   - lifecycle (28 fan-out)
   - merger (15 fan-out)
   - review_executor (20 fan-out)
   - waiter (19 fan-out)

6. Run: uv run python3 -c "from dgov.dag_executor import DagReactor; print('OK')"
7. Run: uv run ruff check src/dgov/dag_executor.py
8. Run: uv run ruff format src/dgov/dag_executor.py

git add src/dgov/dag_executor.py
git commit -m "Reduce dag_executor fan-out with deferred imports"
"""

[units.reduce-dag-executor-fanout.files]
edit = ["src/dgov/dag_executor.py"]
